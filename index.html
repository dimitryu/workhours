<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WorkHours">
<meta name="theme-color" content="#1d4ed8">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="shortcut icon" href="icons/favicon-32.png">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<title>WorkHours</title>
<style>
:root{
  --blue:#1d4ed8;--blue-l:#3b82f6;--blue-d:#1e3a8a;
  --green:#059669;--red:#dc2626;--amber:#d97706;
  --bg:#eef2ff;--card:#fff;--text:#0f172a;
  --text2:#475569;--text3:#94a3b8;--border:#e2e8f0;
  --shadow:0 1px 8px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.04);
  --shadow-md:0 4px 20px rgba(0,0,0,.1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Rubik',-apple-system,Arial,sans-serif;background:var(--bg);color:var(--text);direction:rtl;overflow-x:hidden}

/* ──────── APP SHELL ──────── */
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:var(--bg);position:relative}
.screens-wrap{flex:1;overflow:hidden;position:relative}
.main-screen{display:none;height:100%;overflow-y:auto;padding:14px 14px calc(72px + env(safe-area-inset-bottom));-webkit-overflow-scrolling:touch}
.main-screen.active{display:block}

/* ──────── HEADER ──────── */
.header{background:linear-gradient(135deg,var(--blue-d),var(--blue));color:#fff;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.header-brand{display:flex;align-items:center;gap:8px}
.header-logo{font-size:22px}
.header-title{font-size:17px;font-weight:800;letter-spacing:.3px}
.version-badge{font-size:9px;background:rgba(255,255,255,.2);padding:2px 7px;border-radius:10px;font-weight:600}
.header-user{display:flex;align-items:center;gap:8px}
.user-name-hdr{font-size:12px;opacity:.85;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdr-avatar{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;cursor:pointer}

/* ──────── BOTTOM NAV ──────── */
.bottom-nav{display:flex;background:#fff;border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom);flex-shrink:0;box-shadow:0 -2px 12px rgba(0,0,0,.06)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 8px;border:none;background:none;color:var(--text3);font-size:10px;font-family:inherit;font-weight:600;cursor:pointer;transition:color .15s}
.nav-btn .ni{font-size:21px;line-height:1}
.nav-btn.active{color:var(--blue)}

/* ──────── CARDS ──────── */
.card{background:var(--card);border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:12px}
.card-header .card-title{margin-bottom:0}
.card-sub{font-size:13px;color:var(--blue);font-weight:700}

/* ──────── ACTIVE SESSION ──────── */
.active-card{background:linear-gradient(135deg,var(--blue-d) 0%,var(--blue) 100%);border-radius:16px;padding:16px;margin-bottom:12px;color:#fff;box-shadow:0 6px 24px rgba(29,78,216,.35)}
.active-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.active-label{font-size:10px;opacity:.7;text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px}
.active-job-name{font-size:20px;font-weight:800}
.active-since{font-size:12px;opacity:.65;margin-top:2px}
.active-timer-box{background:rgba(255,255,255,.15);border-radius:12px;padding:8px 14px;text-align:center}
.active-timer{font-size:26px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:1px}

/* ──────── BUTTONS ──────── */
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border-radius:12px;border:none;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;width:100%;transition:transform .1s,opacity .1s}
.btn:active{transform:scale(.97);opacity:.85}
.btn-primary{background:var(--blue);color:#fff}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-outline{background:transparent;color:var(--blue);border:2px solid var(--blue)}
.btn-ghost{background:var(--bg);color:var(--text)}
.btn-sm{padding:8px 14px;font-size:13px}
.btn-icon{background:var(--blue);color:#fff;border:none;padding:6px 12px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.mt8{margin-top:8px}

/* ──────── FORMS ──────── */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:5px}
.form-input{width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:10px;font-size:15px;color:var(--text);background:#fff;font-family:inherit;direction:rtl;transition:border-color .15s}
.form-input:focus{outline:none;border-color:var(--blue)}
select.form-input{cursor:pointer}

/* ──────── ENTRY ROWS ──────── */
.entry-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer}
.entry-row:last-child{border-bottom:none;padding-bottom:0}
.er-details{flex:1}
.er-job{font-size:14px;font-weight:600}
.er-time{font-size:12px;color:var(--text3);margin-top:2px}
.er-right{text-align:left;flex-shrink:0}
.er-hours{font-size:15px;font-weight:700;color:var(--blue)}
.er-earn{font-size:11px;color:var(--green);font-weight:600;margin-top:2px}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot.sm{width:7px;height:7px}
.ot-badge{display:inline-block;font-size:9px;font-weight:700;background:#fef3c7;color:#92400e;padding:2px 5px;border-radius:4px;margin-top:2px}

/* ──────── JOB CLOCK BUTTONS ──────── */
.job-btns-grid{display:flex;flex-direction:column;gap:8px}
.job-btn{display:flex;align-items:center;gap:10px;padding:13px 16px;border-radius:12px;border:2px solid;background:#fff;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:transform .1s,box-shadow .1s;text-align:right;width:100%}
.job-btn:active{transform:scale(.97)}
.job-btn-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ──────── STATS ──────── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:var(--card);border-radius:14px;padding:14px;text-align:center;box-shadow:var(--shadow)}
.stat-card.accent{background:var(--blue)}
.stat-card.accent .stat-val{color:#fff}
.stat-card.accent .stat-lbl{color:rgba(255,255,255,.7)}
.stat-card.warn{background:#fffbeb}
.stat-card.warn .stat-val{color:var(--amber)}
.stat-val{font-size:20px;font-weight:800;color:var(--blue)}
.stat-lbl{font-size:10px;color:var(--text3);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}

/* ──────── MONTH SELECTOR ──────── */
.month-sel{display:flex;gap:8px;overflow-x:auto;padding:2px 0 10px;scrollbar-width:none}
.month-sel::-webkit-scrollbar{display:none}
.month-chip{flex-shrink:0;padding:7px 16px;border-radius:20px;border:2px solid var(--border);background:#fff;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;white-space:nowrap;color:var(--text2)}
.month-chip.active{background:var(--blue);color:#fff;border-color:var(--blue)}

/* ──────── REPORT ──────── */
.day-card{background:var(--bg);border-radius:10px;padding:10px;margin-bottom:8px}
.day-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.day-label{font-size:13px;font-weight:700}
.day-total{font-size:12px;color:var(--blue);font-weight:700}
.sub-entry{display:flex;align-items:center;gap:8px;font-size:12px;padding:5px 0;color:var(--text2);cursor:pointer}
.se-earn{color:var(--green);font-weight:600;margin-right:auto}
.job-stat-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.job-stat-row:last-child{border-bottom:none}
.jsr-name{flex:1;font-weight:600;font-size:14px}
.jsr-right{text-align:left}
.jsr-hours{font-size:14px;font-weight:700;color:var(--blue)}
.jsr-earn{font-size:12px;color:var(--green);font-weight:600}

/* ──────── MODAL ──────── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:flex-end;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:22px 22px 0 0;padding:20px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.modal-title{font-size:18px;font-weight:700}
.modal-close{width:30px;height:30px;border-radius:50%;border:none;background:var(--bg);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}

/* ──────── CALC PREVIEW ──────── */
.calc-box{background:var(--bg);border-radius:10px;padding:10px;margin-bottom:14px}
.calc-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid var(--border)}
.calc-row:last-child{border-bottom:none}
.calc-row.ot{color:var(--amber)}
.calc-row.earn{color:var(--green);font-weight:700;font-size:15px}
.calc-empty,.calc-err{font-size:13px;color:var(--text3);text-align:center;padding:8px 0}
.calc-err{color:var(--red)}

/* ──────── COLOR PICKER ──────── */
.color-picker{display:flex;flex-wrap:wrap;gap:10px}
.cswatch{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:border-color .15s,transform .1s}
.cswatch.active{border-color:var(--text);transform:scale(1.15)}

/* ──────── SETTINGS ──────── */
.profile-row{display:flex;align-items:center;gap:12px}
.profile-avatar{width:44px;height:44px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0}
.profile-name{font-size:16px;font-weight:700}
.profile-email{font-size:12px;color:var(--text3);margin-top:2px}
.job-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer}
.job-item:last-child{border-bottom:none}
.ji-details{flex:1}
.ji-name{font-size:15px;font-weight:600}
.ji-rate{font-size:12px;color:var(--text3);margin-top:2px}
.ji-arrow{color:var(--text3);font-size:22px}
.ot-rules{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.ot-rule{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg);border-radius:8px;font-size:13px}
.ot-rule strong{color:var(--blue)}
.info-note{font-size:11px;color:var(--text3);line-height:1.6;margin-top:6px}
.about-info{font-size:13px;color:var(--text2);line-height:2}

/* ──────── AUTH ──────── */
#auth-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;background:linear-gradient(160deg,var(--blue-d) 0%,var(--blue) 55%,var(--blue-l) 100%)}
.auth-logo{text-align:center;margin-bottom:24px}
.auth-logo-icon{font-size:60px}
.auth-logo-title{font-size:30px;font-weight:800;color:#fff;margin-top:8px;letter-spacing:.5px}
.auth-logo-sub{font-size:13px;color:rgba(255,255,255,.75);margin-top:4px}
.auth-version{font-size:10px;color:rgba(255,255,255,.4);margin-top:6px}
.auth-card{background:#fff;border-radius:24px;padding:24px 20px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.tabs{display:flex;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:18px}
.tab{flex:1;padding:9px;border-radius:8px;border:none;font-size:13px;font-weight:600;font-family:inherit;color:var(--text3);cursor:pointer;transition:all .15s;background:transparent}
.tab.active{background:#fff;color:var(--blue);box-shadow:0 1px 4px rgba(0,0,0,.1)}

/* ──────── SCAN ──────── */
#camera-container{position:relative;border-radius:14px;overflow:hidden;background:#000;aspect-ratio:4/3;margin-bottom:10px}
#camera-video{width:100%;height:100%;object-fit:cover;display:block}
.camera-btns{display:flex;gap:10px;margin-top:6px}
.gallery-drop{border:2px dashed var(--border);border-radius:14px;padding:40px 20px;text-align:center;cursor:pointer;background:#fff;transition:border-color .15s}
.gallery-drop:hover{border-color:var(--blue)}
.gd-icon{font-size:40px;margin-bottom:8px}
.gd-text{font-size:14px;font-weight:600;color:var(--text2)}
.gd-sub{font-size:12px;color:var(--text3);margin-top:4px}
.scan-loading{background:#fff;border-radius:14px;padding:20px;display:flex;align-items:center;gap:10px;justify-content:center;font-size:14px;color:var(--text2)}
.scan-err{background:#fff5f5;border-radius:14px;padding:16px;color:var(--red);font-size:13px;text-align:center}
.scan-manual,.scan-success{background:#fff;border-radius:14px;padding:16px}
.ss-title{font-size:16px;font-weight:700;margin-bottom:4px}
.ss-conf{font-size:12px;color:var(--text3);margin-bottom:14px}
.sm-title{font-size:15px;font-weight:700;color:var(--text2);margin-bottom:6px;text-align:center}
.sm-sub{font-size:13px;color:var(--text3);text-align:center}
.scan-img-preview{width:100%;border-radius:12px;margin-bottom:12px;display:block;max-height:220px;object-fit:cover}

/* ──────── CLOCK OUT MODAL ──────── */
.co-preview{background:var(--bg);border-radius:12px;padding:14px;margin-bottom:14px}
.co-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)}
.co-row:last-child{border-bottom:none}
.co-label{font-size:13px;color:var(--text2)}
.co-val{font-size:14px;font-weight:700}
.co-earn{color:var(--green);font-size:18px;font-weight:800}
.co-job-header{font-size:20px;font-weight:800;margin-bottom:14px}

/* ──────── LOADING / TOAST ──────── */
#loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.92);display:none;align-items:center;justify-content:center;z-index:200;flex-direction:column;gap:12px}
#loading-overlay.show{display:flex}
.ld-msg{font-size:14px;color:var(--text2);font-weight:500}
#toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:300;opacity:0;transition:opacity .25s;max-width:90vw;text-align:center;pointer-events:none;white-space:pre-line}
#toast.show{opacity:1}
#toast.err{background:var(--red)}
.spinner{width:22px;height:22px;border:3px solid rgba(255,255,255,.3);border-radius:50%;border-top-color:#fff;animation:spin .7s linear infinite}
.spinner.dark{border-color:rgba(29,78,216,.15);border-top-color:var(--blue)}
@keyframes spin{to{transform:rotate(360deg)}}

/* ──────── EMPTY STATE ──────── */
.empty-state{text-align:center;padding:24px 12px}
.es-icon{font-size:42px;margin-bottom:8px}
.es-title{font-size:16px;font-weight:700;color:var(--text2);margin-bottom:4px}
.es-sub{font-size:13px;color:var(--text3)}

/* ──────── MISC ──────── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sep{height:1px;background:var(--border);margin:12px 0}
.text-center{text-align:center}

/* ──── DARK MODE ──── */
@media(prefers-color-scheme:dark){:root:not([data-theme="light"]){--bg:#0f172a;--card:#1e293b;--text:#f1f5f9;--text2:#94a3b8;--text3:#475569;--border:#334155;--shadow:0 1px 8px rgba(0,0,0,.3),0 0 0 1px rgba(255,255,255,.04)}}
[data-theme="dark"]{--bg:#0f172a;--card:#1e293b;--text:#f1f5f9;--text2:#94a3b8;--text3:#475569;--border:#334155;--shadow:0 1px 8px rgba(0,0,0,.3),0 0 0 1px rgba(255,255,255,.04)}
[data-theme="light"]{--bg:#eef2ff;--card:#fff;--text:#0f172a;--text2:#475569;--text3:#94a3b8;--border:#e2e8f0;--shadow:0 1px 8px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.04)}

/* ──── SKELETON ──── */
.skel{background:linear-gradient(90deg,var(--border) 25%,var(--bg) 50%,var(--border) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px}
.skel-line{height:13px;margin-bottom:8px}.skel-line.w60{width:60%}.skel-line.w40{width:40%}
.skel-block{height:72px;margin-bottom:10px}.skel-stat{height:68px;border-radius:12px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ──── SCREEN TRANSITIONS ──── */
@keyframes scr-in{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
.screen-entering{animation:scr-in .18s ease forwards}

/* ──── EARNINGS ANIMATION ──── */
#earn-overlay{position:fixed;inset:0;background:linear-gradient(135deg,var(--green),#047857);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:250;gap:6px}
#earn-overlay.show{display:flex}
#earn-overlay .ea-inner{animation:earnPop .4s cubic-bezier(.34,1.56,.64,1) both;text-align:center}
@keyframes earnPop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
.ea-icon{font-size:64px;animation:eaBounce .6s ease .1s both}
@keyframes eaBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.ea-amount{font-size:52px;font-weight:800;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.2);margin:4px 0}
.ea-sub{font-size:17px;color:rgba(255,255,255,.85);font-weight:600}
.ea-job{font-size:13px;color:rgba(255,255,255,.65);margin-top:2px}
.ea-tap{font-size:11px;color:rgba(255,255,255,.5);margin-top:20px}

/* ──── WEEK MINI-BARS ──── */
.week-bars{display:flex;align-items:flex-end;gap:3px;height:44px;margin:10px 0 4px}
.wb{display:flex;flex-direction:column;align-items:center;flex:1}
.wb-fill{width:100%;border-radius:3px 3px 0 0;min-height:2px}
.wb-lbl{font-size:8px;color:var(--text3);margin-top:2px;font-weight:600}
.wb.today .wb-fill{outline:2px solid var(--blue);outline-offset:1px}
.wb.today .wb-lbl{color:var(--blue);font-weight:800}

/* ──── CHART ──── */
.chart-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;cursor:grab;margin:0 -14px;padding:0 14px 6px}
.chart-scroll::-webkit-scrollbar{height:3px}
.chart-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.chart-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.cl-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);font-weight:500}
.cl-dot{width:8px;height:8px;border-radius:50%}

/* ──── SCAN QUEUE ──── */
.sq-list{display:flex;flex-direction:column;gap:8px;margin:10px 0}
.sq-item{display:flex;align-items:center;gap:10px;background:var(--bg);border-radius:10px;padding:8px 10px}
.sq-thumb{width:44px;height:34px;object-fit:cover;border-radius:6px;flex-shrink:0}
.sq-info{flex:1;min-width:0}.sq-name{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sq-state{font-size:10px;font-weight:700}.sq-state.ok{color:var(--green)}.sq-state.pending{color:var(--amber)}.sq-state.err{color:var(--red)}
.sq-rm{width:22px;height:22px;border-radius:50%;border:none;background:var(--border);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ──── REPORT ACTIONS ──── */

// ═══════════════════════════════════════════════════════════
//  DARK MODE
// ═══════════════════════════════════════════════════════════
function darkModeInit() {
  const saved = localStorage.getItem('wh_dark');
  if (saved) {
    document.documentElement.setAttribute('data-theme', saved);
  }
  updateDarkBtn();
}

function toggleDark() {
  const cur = document.documentElement.getAttribute('data-theme');
  const isDark = cur === 'dark' || (!cur && window.matchMedia('(prefers-color-scheme: dark)').matches);
  const next = isDark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('wh_dark', next);
  updateDarkBtn();
}

function getDarkLabel() {
  const cur = document.documentElement.getAttribute('data-theme');
  const isDark = cur === 'dark' || (!cur && window.matchMedia('(prefers-color-scheme: dark)').matches);
  return isDark ? '🌙 כהה' : '☀️ בהיר';
}

function updateDarkBtn() {
  const cur = document.documentElement.getAttribute('data-theme');
  const isDark = cur === 'dark' || (!cur && window.matchMedia('(prefers-color-scheme: dark)').matches);
  const hdrBtn = qs('dm-btn');
  if (hdrBtn) hdrBtn.textContent = isDark ? '☀️' : '🌙';
}

// ═══════════════════════════════════════════════════════════
//  HAPTIC FEEDBACK
// ═══════════════════════════════════════════════════════════
function haptic(type = 'light') {
  if (!navigator.vibrate) return;
  const p = { light: 30, medium: 50, heavy: [50, 30, 80] };
  navigator.vibrate(p[type] || 30);
}

// ═══════════════════════════════════════════════════════════
//  WEEK SUMMARY
// ═══════════════════════════════════════════════════════════
function renderWeekSummary() {
  const days = [];
  const today = new Date();
  let weekMins = 0, weekEarn = 0;

  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const iso = fmtDateISO(d);
    const dayEntries = S.entries.filter(e => e.date === iso);
    const mins = dayEntries.reduce((s, e) => s + (e.totalMins || 0), 0);
    const earn = dayEntries.reduce((s, e) => s + (e.earnings || 0), 0);
    weekMins += mins;
    weekEarn += earn;
    days.push({ d, iso, mins, earn, isToday: i === 0 });
  }

  const maxMins = Math.max(...days.map(d => d.mins), 480);
  const labels = ['א', 'ב', 'ג', 'ד', 'ה', 'ו', 'ש'];

  const bars = days.map(({ d, mins, isToday }) => {
    const pct = Math.max(mins > 0 ? 6 : 0, Math.round((mins / maxMins) * 100));
    const color = mins > 0 ? (S.jobs[0]?.color || 'var(--blue)') : 'var(--border)';
    const lbl = labels[d.getDay()];
    return `<div class="wb${isToday ? ' today' : ''}">
      <div class="wb-fill" style="height:${pct}%;background:${color}"></div>
      <div class="wb-lbl">${lbl}</div>
    </div>`;
  }).join('');

  return `
    <div class="card">
      <div class="card-header">
        <div class="card-title">📆 השבוע</div>
        <div class="card-sub">${fmtMins(weekMins)} | ${fmtMoney(weekEarn)}</div>
      </div>
      <div class="week-bars">${bars}</div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════
//  BAR CHART
// ═══════════════════════════════════════════════════════════
function renderBarChart(entries, year, month) {
  if (entries.length === 0) return '';
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const byDay = {};
  entries.forEach(e => {
    const day = parseInt(e.date.split('-')[2]);
    if (!byDay[day]) byDay[day] = [];
    byDay[day].push(e);
  });

  const maxMins = Math.max(...Object.values(byDay).map(d => d.reduce((s, e) => s + e.totalMins, 0)), 480);
  const BW = 16, GAP = 3, ML = 28, MR = 8, MT = 8, MB = 20;
  const chartW = daysInMonth * (BW + GAP) + ML + MR;
  const chartH = 110 + MB;
  const innerH = chartH - MT - MB;

  // Y axis labels
  const yLabels = [0, 4, 8].map(h => {
    const y = MT + innerH - (h / (maxMins / 60)) * innerH;
    return `<text x="${ML - 4}" y="${y + 4}" font-size="8" fill="var(--text3)" text-anchor="end">${h}h</text>
            <line x1="${ML}" y1="${y}" x2="${chartW - MR}" y2="${y}" stroke="var(--border)" stroke-width=".5" stroke-dasharray="3,3"/>`;
  }).join('');

  let bars = '';
  const jobColors = {};
  for (let day = 1; day <= daysInMonth; day++) {
    const dayData = byDay[day];
    if (!dayData) continue;
    const x = ML + (day - 1) * (BW + GAP);
    let stackY = MT + innerH;
    dayData.forEach(e => {
      const h = (e.totalMins || 0) / maxMins * innerH;
      if (h < 0.5) return;
      stackY -= h;
      const col = e.jobColor || '#3b82f6';
      jobColors[e.jobId] = { color: col, name: e.jobName };
      bars += `<rect x="${x}" y="${stackY.toFixed(1)}" width="${BW}" height="${h.toFixed(1)}" fill="${col}" rx="2"/>`;
    });
    if (day === 1 || day % 5 === 0 || day === daysInMonth) {
      bars += `<text x="${x + BW / 2}" y="${chartH - 4}" font-size="8" fill="var(--text3)" text-anchor="middle">${day}</text>`;
    }
  }

  const legend = Object.values(jobColors).map(j =>
    `<div class="cl-item"><div class="cl-dot" style="background:${j.color}"></div>${j.name}</div>`).join('');

  return `
    <div class="card">
      <div class="card-title">📈 גרף שעות לפי יום</div>
      <div class="chart-scroll" id="chart-wrap">
        <svg width="${chartW}" height="${chartH}" style="display:block">
          <line x1="${ML}" y1="${MT}" x2="${ML}" y2="${MT + innerH}" stroke="var(--border)" stroke-width="1"/>
          ${yLabels}${bars}
        </svg>
      </div>
      ${legend ? `<div class="chart-legend">${legend}</div>` : ''}
    </div>`;
}

// ═══════════════════════════════════════════════════════════
//  COPY DAY
// ═══════════════════════════════════════════════════════════
function copyDay(fromDate) {
  const dayEntries = S.entries.filter(e => e.date === fromDate);
  if (dayEntries.length === 0) { toast('אין רשומות ביום זה', true); return; }
  const today = fmtDateISO(new Date());
  // Open entry modal for each (only first for simplicity, user can add more)
  const e = dayEntries[0];
  openAddEntry({ date: today, clockIn: e.clockIn, clockOut: e.clockOut, jobId: e.jobId });
  toast(`📋 הועתק מ-${fmtDateDisplay(fromDate)}`);
}

// ═══════════════════════════════════════════════════════════
//  EXPORT CSV
// ═══════════════════════════════════════════════════════════
function exportCSV() {
  if (S.entries.length === 0) { toast('אין רשומות לייצוא', true); return; }
  const rows = [
    ['תאריך', 'עבודה', 'כניסה', 'יציאה', 'שעות', 'הכנסה (₪)'],
    ...S.entries.map(e => [
      fmtDateDisplay(e.date), e.jobName, e.clockIn, e.clockOut,
      (e.totalMins / 60).toFixed(2), (e.earnings || 0).toFixed(2)
    ])
  ];
  // Totals row
  const totalH = S.entries.reduce((s, e) => s + e.totalMins, 0) / 60;
  const totalE = S.entries.reduce((s, e) => s + (e.earnings || 0), 0);
  rows.push(['', 'סה"כ', '', '', totalH.toFixed(2), totalE.toFixed(2)]);

  const csv = '\uFEFF' + rows.map(r => r.map(v => `"${v}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `workhours_${HE_MONTHS[S.month]}_${S.year}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast('📥 קובץ CSV הורד!');
}

// ═══════════════════════════════════════════════════════════
//  REMINDER (clock-in too long)
// ═══════════════════════════════════════════════════════════
let _reminderTimer = null;
function startReminder() {
  stopReminder();
  _reminderTimer = setInterval(() => {
    if (!S.activeSession) { stopReminder(); return; }
    const elapsed = (Date.now() - new Date(S.activeSession.clockIn)) / 3600000;
    if (elapsed >= 10) {
      haptic('medium');
      if (Notification.permission === 'granted') {
        new Notification('WorkHours ⏰', {
          body: `שכחת לצאת מ-${S.activeSession.jobName}? עבדת כבר ${Math.floor(elapsed)} שעות.`,
          icon: 'icons/icon-192.png'
        });
      } else {
        toast(`⏰ שכחת לצאת? עבדת ${Math.floor(elapsed)} שעות ב-${S.activeSession.jobName}`, false);
      }
      stopReminder(); // Only alert once
    }
  }, 5 * 60 * 1000); // Check every 5 minutes

  // Request notification permission quietly
  if (Notification && Notification.permission === 'default') {
    Notification.requestPermission().catch(() => {});
  }
}

function stopReminder() {
  if (_reminderTimer) { clearInterval(_reminderTimer); _reminderTimer = null; }
}

// ═══════════════════════════════════════════════════════════
//  MULTIPLE SCAN QUEUE
// ═══════════════════════════════════════════════════════════
let _scanQueue = [];

async function handleMultiScan(event) {
  const files = Array.from(event.target.files);
  if (!files.length) return;
  for (const file of files) {
    if (!file.type.startsWith('image/')) continue;
    const dataUrl = await new Promise(res => {
      const r = new FileReader();
      r.onload = e => res(e.target.result);
      r.readAsDataURL(file);
    });
    _scanQueue.push({ file, dataUrl, b64: dataUrl.split(',')[1], mime: file.type, status: 'pending', result: null });
  }
  renderScanQueue();
  // Auto process
  await processScanQueue();
}

function renderScanQueue() {
  if (_scanQueue.length === 0) { setHTML('home-scan-queue', ''); return; }
  const items = _scanQueue.map((item, i) => {
    const statusMap = { pending: '⏳ ממתין', processing: '🔄 מעבד...', ok: '✅ זוהה', err: '❌ שגיאה' };
    const cls = item.status === 'ok' ? 'ok' : item.status === 'err' ? 'err' : 'pending';
    const dateDisp = item.result?.date ? fmtDateDisplay(item.result.date) : '';
    const timeDisp = item.result ? `${item.result.clockIn||'?'}–${item.result.clockOut||'?'}` : '';
    return `<div class="sq-item">
      <img class="sq-thumb" src="${item.dataUrl}" alt="תלוש ${i+1}">
      <div class="sq-info">
        <div class="sq-name">תלוש ${i+1}</div>
        <div class="sq-state ${cls}">${statusMap[item.status]||item.status}</div>
        ${dateDisp ? `<div class="sq-date">${dateDisp} ${timeDisp}</div>` : ''}
      </div>
      ${item.status === 'ok' ? `<button class="btn-icon" style="font-size:11px" onclick="applyScanQueueItem(${i})">שמור</button>` : ''}
      <button class="sq-rm" onclick="removeScanQueueItem(${i})">✕</button>
    </div>`;
  }).join('');
  setHTML('home-scan-queue', `<div class="sq-list">${items}</div>`);
}

async function processScanQueue() {
  const apiKey = localStorage.getItem('anthropic_api_key');
  if (!apiKey) { toast('הוסף מפתח API בהגדרות', true); return; }
  for (let i = 0; i < _scanQueue.length; i++) {
    if (_scanQueue[i].status !== 'pending') continue;
    _scanQueue[i].status = 'processing';
    renderScanQueue();
    try {
      _scanQueue[i].result = await analyzeWithClaude(_scanQueue[i].b64, _scanQueue[i].mime);
      _scanQueue[i].status = 'ok';
    } catch (e) {
      _scanQueue[i].status = 'err';
      _scanQueue[i].error = e.message;
    }
    renderScanQueue();
  }
  const ok = _scanQueue.filter(i => i.status === 'ok').length;
  toast(`✅ עיבוד הסתיים: ${ok}/${_scanQueue.length} תלושים זוהו`);
}

function applyScanQueueItem(idx) {
  const item = _scanQueue[idx];
  if (!item?.result) return;
  const date = item.result.date;
  const defJobId = S.jobs[0]?.id || '';
  // Find job by name if Claude returned one
  let jobId = defJobId;
  if (item.result.jobName) {
    const match = S.jobs.find(j => j.name.includes(item.result.jobName) || item.result.jobName.includes(j.name));
    if (match) jobId = match.id;
  }
  openAddEntry({ date, clockIn: item.result.clockIn, clockOut: item.result.clockOut, jobId });
  removeScanQueueItem(idx);
}

function removeScanQueueItem(idx) {
  _scanQueue.splice(idx, 1);
  renderScanQueue();
}

// ═══════════════════════════════════════════════════════════
//  ENHANCED analyzeWithClaude (auto job detection)
// ═══════════════════════════════════════════════════════════
async function analyzeWithClaude(b64, mime) {
  const apiKey = localStorage.getItem('anthropic_api_key');
  const jobNames = S.jobs.map(j => j.name).join(', ');
  const prompt = `נתח את תלוש העבודה. חלץ:
- תאריך העבודה
- שעת כניסה
- שעת יציאה
${jobNames ? `- שם מקום העבודה (בדוק אם תואם לאחת מ: ${jobNames})` : ''}

החזר JSON בלבד, ללא markdown:
{"date":"YYYY-MM-DD","clockIn":"HH:MM","clockOut":"HH:MM","confidence":"high/medium/low","notes":"","jobName":"שם אם זוהה או null"}

אם לא ניתן לחלץ נתון, השתמש ב-null. תאריך היום: ${fmtDateISO(new Date())}`;

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-API-Key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-opus-4-5',
      max_tokens: 300,
      messages: [{ role: 'user', content: [
        { type: 'image', source: { type: 'base64', media_type: mime, data: b64 } },
        { type: 'text', text: prompt }
      ]}]
    })
  });

  if (!resp.ok) {
    let errMsg = `שגיאת שרת ${resp.status}`;
    try { const eb = await resp.json(); errMsg = eb.error?.message || errMsg; } catch (_) {}
    throw new Error(errMsg);
  }
  const data = await resp.json();
  const text = data.content[0].text.replace(/```json|```/g, '').trim();
  return JSON.parse(text);
}

// ═══════════════════════════════════════════════════════════
//  WEEK SUMMARY
// ═══════════════════════════════════════════════════════════
function renderWeekSummary() {
  const days = [];
  const today = new Date();
  let weekMins = 0, weekEarn = 0;

  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const iso = fmtDateISO(d);
    const dayEntries = S.entries.filter(e => e.date === iso);
    const mins = dayEntries.reduce((s, e) => s + (e.totalMins || 0), 0);
    const earn = dayEntries.reduce((s, e) => s + (e.earnings || 0), 0);
    weekMins += mins;
    weekEarn += earn;
    days.push({ d, iso, mins, earn, isToday: i === 0 });
  }

  const maxMins = Math.max(...days.map(d => d.mins), 480);
  const labels = ['א', 'ב', 'ג', 'ד', 'ה', 'ו', 'ש'];

  const bars = days.map(({ d, mins, isToday }) => {
    const pct = Math.max(mins > 0 ? 6 : 0, Math.round((mins / maxMins) * 100));
    const color = mins > 0 ? (S.jobs[0]?.color || 'var(--blue)') : 'var(--border)';
    const lbl = labels[d.getDay()];
    return `<div class="wb${isToday ? ' today' : ''}">
      <div class="wb-fill" style="height:${pct}%;background:${color}"></div>
      <div class="wb-lbl">${lbl}</div>
    </div>`;
  }).join('');

  return `
    <div class="card">
      <div class="card-header">
        <div class="card-title">📆 השבוע</div>
        <div class="card-sub">${fmtMins(weekMins)} | ${fmtMoney(weekEarn)}</div>
      </div>
      <div class="week-bars">${bars}</div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════
//  BAR CHART
// ═══════════════════════════════════════════════════════════
function renderBarChart(entries, year, month) {
  if (entries.length === 0) return '';
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const byDay = {};
  entries.forEach(e => {
    const day = parseInt(e.date.split('-')[2]);
    if (!byDay[day]) byDay[day] = [];
    byDay[day].push(e);
  });

  const maxMins = Math.max(...Object.values(byDay).map(d => d.reduce((s, e) => s + e.totalMins, 0)), 480);
  const BW = 16, GAP = 3, ML = 28, MR = 8, MT = 8, MB = 20;
  const chartW = daysInMonth * (BW + GAP) + ML + MR;
  const chartH = 110 + MB;
  const innerH = chartH - MT - MB;

  // Y axis labels
  const yLabels = [0, 4, 8].map(h => {
    const y = MT + innerH - (h / (maxMins / 60)) * innerH;
    return `<text x="${ML - 4}" y="${y + 4}" font-size="8" fill="var(--text3)" text-anchor="end">${h}h</text>
            <line x1="${ML}" y1="${y}" x2="${chartW - MR}" y2="${y}" stroke="var(--border)" stroke-width=".5" stroke-dasharray="3,3"/>`;
  }).join('');

  let bars = '';
  const jobColors = {};
  for (let day = 1; day <= daysInMonth; day++) {
    const dayData = byDay[day];
    if (!dayData) continue;
    const x = ML + (day - 1) * (BW + GAP);
    let stackY = MT + innerH;
    dayData.forEach(e => {
      const h = (e.totalMins || 0) / maxMins * innerH;
      if (h < 0.5) return;
      stackY -= h;
      const col = e.jobColor || '#3b82f6';
      jobColors[e.jobId] = { color: col, name: e.jobName };
      bars += `<rect x="${x}" y="${stackY.toFixed(1)}" width="${BW}" height="${h.toFixed(1)}" fill="${col}" rx="2"/>`;
    });
    if (day === 1 || day % 5 === 0 || day === daysInMonth) {
      bars += `<text x="${x + BW / 2}" y="${chartH - 4}" font-size="8" fill="var(--text3)" text-anchor="middle">${day}</text>`;
    }
  }

  const legend = Object.values(jobColors).map(j =>
    `<div class="cl-item"><div class="cl-dot" style="background:${j.color}"></div>${j.name}</div>`).join('');

  return `
    <div class="card">
      <div class="card-title">📈 גרף שעות לפי יום</div>
      <div class="chart-scroll" id="chart-wrap">
        <svg width="${chartW}" height="${chartH}" style="display:block">
          <line x1="${ML}" y1="${MT}" x2="${ML}" y2="${MT + innerH}" stroke="var(--border)" stroke-width="1"/>
          ${yLabels}${bars}
        </svg>
      </div>
      ${legend ? `<div class="chart-legend">${legend}</div>` : ''}
    </div>`;
}

// ═══════════════════════════════════════════════════════════
//  REMINDER (clock-in too long)
// ═══════════════════════════════════════════════════════════
let _reminderTimer = null;
function startReminder() {
  stopReminder();
  _reminderTimer = setInterval(() => {
    if (!S.activeSession) { stopReminder(); return; }
    const elapsed = (Date.now() - new Date(S.activeSession.clockIn)) / 3600000;
    if (elapsed >= 10) {
      haptic('medium');
      if (Notification.permission === 'granted') {
        new Notification('WorkHours ⏰', {
          body: `שכחת לצאת מ-${S.activeSession.jobName}? עבדת כבר ${Math.floor(elapsed)} שעות.`,
          icon: 'icons/icon-192.png'
        });
      } else {
        toast(`⏰ שכחת לצאת? עבדת ${Math.floor(elapsed)} שעות ב-${S.activeSession.jobName}`, false);
      }
      stopReminder(); // Only alert once
    }
  }, 5 * 60 * 1000); // Check every 5 minutes

  // Request notification permission quietly
  if (Notification && Notification.permission === 'default') {
    Notification.requestPermission().catch(() => {});
  }
}

function stopReminder() {
  if (_reminderTimer) { clearInterval(_reminderTimer); _reminderTimer = null; }
}

// ═══════════════════════════════════════════════════════════
//  MULTIPLE SCAN QUEUE
// ═══════════════════════════════════════════════════════════
let _scanQueue = [];

async function handleMultiScan(event) {
  const files = Array.from(event.target.files);
  if (!files.length) return;
  for (const file of files) {
    if (!file.type.startsWith('image/')) continue;
    const dataUrl = await new Promise(res => {
      const r = new FileReader();
      r.onload = e => res(e.target.result);
      r.readAsDataURL(file);
    });
    _scanQueue.push({ file, dataUrl, b64: dataUrl.split(',')[1], mime: file.type, status: 'pending', result: null });
  }
  renderScanQueue();
  // Auto process
  await processScanQueue();
}

function renderScanQueue() {
  if (_scanQueue.length === 0) { setHTML('home-scan-queue', ''); return; }
  const items = _scanQueue.map((item, i) => {
    const statusMap = { pending: '⏳ ממתין', processing: '🔄 מעבד...', ok: '✅ זוהה', err: '❌ שגיאה' };
    const cls = item.status === 'ok' ? 'ok' : item.status === 'err' ? 'err' : 'pending';
    const dateDisp = item.result?.date ? fmtDateDisplay(item.result.date) : '';
    const timeDisp = item.result ? `${item.result.clockIn||'?'}–${item.result.clockOut||'?'}` : '';
    return `<div class="sq-item">
      <img class="sq-thumb" src="${item.dataUrl}" alt="תלוש ${i+1}">
      <div class="sq-info">
        <div class="sq-name">תלוש ${i+1}</div>
        <div class="sq-state ${cls}">${statusMap[item.status]||item.status}</div>
        ${dateDisp ? `<div class="sq-date">${dateDisp} ${timeDisp}</div>` : ''}
      </div>
      ${item.status === 'ok' ? `<button class="btn-icon" style="font-size:11px" onclick="applyScanQueueItem(${i})">שמור</button>` : ''}
      <button class="sq-rm" onclick="removeScanQueueItem(${i})">✕</button>
    </div>`;
  }).join('');
  setHTML('home-scan-queue', `<div class="sq-list">${items}</div>`);
}

async function processScanQueue() {
  const apiKey = localStorage.getItem('anthropic_api_key');
  if (!apiKey) { toast('הוסף מפתח API בהגדרות', true); return; }
  for (let i = 0; i < _scanQueue.length; i++) {
    if (_scanQueue[i].status !== 'pending') continue;
    _scanQueue[i].status = 'processing';
    renderScanQueue();
    try {
      _scanQueue[i].result = await analyzeWithClaude(_scanQueue[i].b64, _scanQueue[i].mime);
      _scanQueue[i].status = 'ok';
    } catch (e) {
      _scanQueue[i].status = 'err';
      _scanQueue[i].error = e.message;
    }
    renderScanQueue();
  }
  const ok = _scanQueue.filter(i => i.status === 'ok').length;
  toast(`✅ עיבוד הסתיים: ${ok}/${_scanQueue.length} תלושים זוהו`);
}

function applyScanQueueItem(idx) {
  const item = _scanQueue[idx];
  if (!item?.result) return;
  const date = item.result.date;
  const defJobId = S.jobs[0]?.id || '';
  // Find job by name if Claude returned one
  let jobId = defJobId;
  if (item.result.jobName) {
    const match = S.jobs.find(j => j.name.includes(item.result.jobName) || item.result.jobName.includes(j.name));
    if (match) jobId = match.id;
  }
  openAddEntry({ date, clockIn: item.result.clockIn, clockOut: item.result.clockOut, jobId });
  removeScanQueueItem(idx);
}

function removeScanQueueItem(idx) {
  _scanQueue.splice(idx, 1);
  renderScanQueue();
}

// ═══════════════════════════════════════════════════════════
//  ENHANCED analyzeWithClaude (auto job detection)
// ═══════════════════════════════════════════════════════════
async function analyzeWithClaude(b64, mime) {
  const apiKey = localStorage.getItem('anthropic_api_key');
  const jobNames = S.jobs.map(j => j.name).join(', ');
  const prompt = `נתח את תלוש העבודה. חלץ:
- תאריך העבודה
- שעת כניסה
- שעת יציאה
${jobNames ? `- שם מקום העבודה (בדוק אם תואם לאחת מ: ${jobNames})` : ''}

החזר JSON בלבד, ללא markdown:
{"date":"YYYY-MM-DD","clockIn":"HH:MM","clockOut":"HH:MM","confidence":"high/medium/low","notes":"","jobName":"שם אם זוהה או null"}

אם לא ניתן לחלץ נתון, השתמש ב-null. תאריך היום: ${fmtDateISO(new Date())}`;

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-API-Key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-opus-4-5',
      max_tokens: 300,
      messages: [{ role: 'user', content: [
        { type: 'image', source: { type: 'base64', media_type: mime, data: b64 } },
        { type: 'text', text: prompt }
      ]}]
    })
  });

  if (!resp.ok) {
    let errMsg = `שגיאת שרת ${resp.status}`;
    try { const eb = await resp.json(); errMsg = eb.error?.message || errMsg; } catch (_) {}
    throw new Error(errMsg);
  }
  const data = await resp.json();
  const text = data.content[0].text.replace(/```json|```/g, '').trim();
  return JSON.parse(text);
}

// ═══════════════════════════════════════════════════════════
//  WEEK SUMMARY
// ═══════════════════════════════════════════════════════════
function renderWeekSummary() {
  const days = [];
  const today = new Date();
  let weekMins = 0, weekEarn = 0;

  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const iso = fmtDateISO(d);
    const dayEntries = S.entries.filter(e => e.date === iso);
    const mins = dayEntries.reduce((s, e) => s + (e.totalMins || 0), 0);
    const earn = dayEntries.reduce((s, e) => s + (e.earnings || 0), 0);
    weekMins += mins;
    weekEarn += earn;
    days.push({ d, iso, mins, earn, isToday: i === 0 });
  }

  const maxMins = Math.max(...days.map(d => d.mins), 480);
  const labels = ['א', 'ב', 'ג', 'ד', 'ה', 'ו', 'ש'];

  const bars = days.map(({ d, mins, isToday }) => {
    const pct = Math.max(mins > 0 ? 6 : 0, Math.round((mins / maxMins) * 100));
    const color = mins > 0 ? (S.jobs[0]?.color || 'var(--blue)') : 'var(--border)';
    const lbl = labels[d.getDay()];
    return `<div class="wb${isToday ? ' today' : ''}">
      <div class="wb-fill" style="height:${pct}%;background:${color}"></div>
      <div class="wb-lbl">${lbl}</div>
    </div>`;
  }).join('');

  return `
    <div class="card">
      <div class="card-header">
        <div class="card-title">📆 השבוע</div>
        <div class="card-sub">${fmtMins(weekMins)} | ${fmtMoney(weekEarn)}</div>
      </div>
      <div class="week-bars">${bars}</div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════
//  BAR CHART
// ═══════════════════════════════════════════════════════════
function renderBarChart(entries, year, month) {
  if (entries.length === 0) return '';
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const byDay = {};
  entries.forEach(e => {
    const day = parseInt(e.date.split('-')[2]);
    if (!byDay[day]) byDay[day] = [];
    byDay[day].push(e);
  });

  const maxMins = Math.max(...Object.values(byDay).map(d => d.reduce((s, e) => s + e.totalMins, 0)), 480);
  const BW = 16, GAP = 3, ML = 28, MR = 8, MT = 8, MB = 20;
  const chartW = daysInMonth * (BW + GAP) + ML + MR;
  const chartH = 110 + MB;
  const innerH = chartH - MT - MB;

  // Y axis labels
  const yLabels = [0, 4, 8].map(h => {
    const y = MT + innerH - (h / (maxMins / 60)) * innerH;
    return `<text x="${ML - 4}" y="${y + 4}" font-size="8" fill="var(--text3)" text-anchor="end">${h}h</text>
            <line x1="${ML}" y1="${y}" x2="${chartW - MR}" y2="${y}" stroke="var(--border)" stroke-width=".5" stroke-dasharray="3,3"/>`;
  }).join('');

  let bars = '';
  const jobColors = {};
  for (let day = 1; day <= daysInMonth; day++) {
    const dayData = byDay[day];
    if (!dayData) continue;
    const x = ML + (day - 1) * (BW + GAP);
    let stackY = MT + innerH;
    dayData.forEach(e => {
      const h = (e.totalMins || 0) / maxMins * innerH;
      if (h < 0.5) return;
      stackY -= h;
      const col = e.jobColor || '#3b82f6';
      jobColors[e.jobId] = { color: col, name: e.jobName };
      bars += `<rect x="${x}" y="${stackY.toFixed(1)}" width="${BW}" height="${h.toFixed(1)}" fill="${col}" rx="2"/>`;
    });
    if (day === 1 || day % 5 === 0 || day === daysInMonth) {
      bars += `<text x="${x + BW / 2}" y="${chartH - 4}" font-size="8" fill="var(--text3)" text-anchor="middle">${day}</text>`;
    }
  }

  const legend = Object.values(jobColors).map(j =>
    `<div class="cl-item"><div class="cl-dot" style="background:${j.color}"></div>${j.name}</div>`).join('');

  return `
    <div class="card">
      <div class="card-title">📈 גרף שעות לפי יום</div>
      <div class="chart-scroll" id="chart-wrap">
        <svg width="${chartW}" height="${chartH}" style="display:block">
          <line x1="${ML}" y1="${MT}" x2="${ML}" y2="${MT + innerH}" stroke="var(--border)" stroke-width="1"/>
          ${yLabels}${bars}
        </svg>
      </div>
      ${legend ? `<div class="chart-legend">${legend}</div>` : ''}
    </div>`;
}

  const rows = [
    ['תאריך', 'עבודה', 'כניסה', 'יציאה', 'שעות', 'הכנסה (₪)'],
    ...S.entries.map(e => [
      fmtDateDisplay(e.date), e.jobName, e.clockIn, e.clockOut,

  a.download = `workhours_${HE_MONTHS[S.month]}_${S.year}.csv`;

  URL.revokeObjectURL(url);

      await navigator.clipboard.writeText(text);
      toast('📋 הדוח הועתק ללוח!');

// ═══════════════════════════════════════════════════════════
let _reminderTimer = null;
function startReminder() {
  stopReminder();
  _reminderTimer = setInterval(() => {
    if (!S.activeSession) { stopReminder(); return; }
    const elapsed = (Date.now() - new Date(S.activeSession.clockIn)) / 3600000;
    if (elapsed >= 10) {
      haptic('medium');
      if (Notification.permission === 'granted') {
        new Notification('WorkHours ⏰', {
          body: `שכחת לצאת מ-${S.activeSession.jobName}? עבדת כבר ${Math.floor(elapsed)} שעות.`,
          icon: 'icons/icon-192.png'
        });
      } else {
        toast(`⏰ שכחת לצאת? עבדת ${Math.floor(elapsed)} שעות ב-${S.activeSession.jobName}`, false);
      }
      stopReminder(); // Only alert once
    }
  }, 5 * 60 * 1000); // Check every 5 minutes

  // Request notification permission quietly
  if (Notification && Notification.permission === 'default') {
    Notification.requestPermission().catch(() => {});
  }
}

function stopReminder() {
  if (_reminderTimer) { clearInterval(_reminderTimer); _reminderTimer = null; }
}

let _tpField = null;

function openTp(fieldId, title) {
  _tpField = fieldId;
  qs('tp-title').textContent = title || 'בחר שעה';
  const cur = qs(fieldId)?.value || '';

  // Build hour items 00-23

  for (let i = 0; i < 24; i++) {
    const v = String(i).padStart(2,'0');
    hHtml += `<div class="tp-item${v===hh?' sel':''}" data-v="${v}" onclick="tpSel(this,'h')">${v}</div>`;
  }
  hHtml += '<div class="tp-pad"></div>';

  // Build minute items 00-59
  let mHtml = '<div class="tp-pad"></div>';
  for (let i = 0; i < 60; i++) {
    const v = String(i).padStart(2,'0');
    mHtml += `<div class="tp-item${v===mm?' sel':''}" data-v="${v}" onclick="tpSel(this,'m')">${v}</div>`;
  }

// ═══════════════════════════════════════════════════════════
//  MULTIPLE SCAN QUEUE
// ═══════════════════════════════════════════════════════════
let _scanQueue = [];

async function handleMultiScan(event) {
  const files = Array.from(event.target.files);
  if (!files.length) return;
  for (const file of files) {
    if (!file.type.startsWith('image/')) continue;
    const dataUrl = await new Promise(res => {
      const r = new FileReader();
      r.onload = e => res(e.target.result);
      r.readAsDataURL(file);
    });
    _scanQueue.push({ file, dataUrl, b64: dataUrl.split(',')[1], mime: file.type, status: 'pending', result: null });
  }
  renderScanQueue();
  // Auto process
  await processScanQueue();
}

function renderScanQueue() {
  if (_scanQueue.length === 0) { setHTML('home-scan-queue', ''); return; }
  const items = _scanQueue.map((item, i) => {
    const statusMap = { pending: '⏳ ממתין', processing: '🔄 מעבד...', ok: '✅ זוהה', err: '❌ שגיאה' };
    const cls = item.status === 'ok' ? 'ok' : item.status === 'err' ? 'err' : 'pending';
    const dateDisp = item.result?.date ? fmtDateDisplay(item.result.date) : '';
    const timeDisp = item.result ? `${item.result.clockIn||'?'}–${item.result.clockOut||'?'}` : '';
    return `<div class="sq-item">
      <img class="sq-thumb" src="${item.dataUrl}" alt="תלוש ${i+1}">
      <div class="sq-info">
        <div class="sq-name">תלוש ${i+1}</div>
        <div class="sq-state ${cls}">${statusMap[item.status]||item.status}</div>
        ${dateDisp ? `<div class="sq-date">${dateDisp} ${timeDisp}</div>` : ''}
      </div>
      ${item.status === 'ok' ? `<button class="btn-icon" style="font-size:11px" onclick="applyScanQueueItem(${i})">שמור</button>` : ''}
      <button class="sq-rm" onclick="removeScanQueueItem(${i})">✕</button>
    </div>`;
  }).join('');
  setHTML('home-scan-queue', `<div class="sq-list">${items}</div>`);
}

async function processScanQueue() {
  const apiKey = localStorage.getItem('anthropic_api_key');
  if (!apiKey) { toast('הוסף מפתח API בהגדרות', true); return; }
  for (let i = 0; i < _scanQueue.length; i++) {
    if (_scanQueue[i].status !== 'pending') continue;
    _scanQueue[i].status = 'processing';
    renderScanQueue();
    try {
      _scanQueue[i].result = await analyzeWithClaude(_scanQueue[i].b64, _scanQueue[i].mime);
      _scanQueue[i].status = 'ok';
    } catch (e) {
      _scanQueue[i].status = 'err';
      _scanQueue[i].error = e.message;
    }
    renderScanQueue();
  }
  const ok = _scanQueue.filter(i => i.status === 'ok').length;
  toast(`✅ עיבוד הסתיים: ${ok}/${_scanQueue.length} תלושים זוהו`);
}

function applyScanQueueItem(idx) {
  const item = _scanQueue[idx];
  if (!item?.result) return;
  const date = item.result.date;
  const defJobId = S.jobs[0]?.id || '';
  // Find job by name if Claude returned one
  let jobId = defJobId;
  if (item.result.jobName) {
    const match = S.jobs.find(j => j.name.includes(item.result.jobName) || item.result.jobName.includes(j.name));
    if (match) jobId = match.id;
  }
  openAddEntry({ date, clockIn: item.result.clockIn, clockOut: item.result.clockOut, jobId });
  removeScanQueueItem(idx);
}

function removeScanQueueItem(idx) {
  _scanQueue.splice(idx, 1);
  renderScanQueue();
}

// ═══════════════════════════════════════════════════════════
//  ENHANCED analyzeWithClaude (auto job detection)
// ═══════════════════════════════════════════════════════════
async function analyzeWithClaude(b64, mime) {
  const apiKey = localStorage.getItem('anthropic_api_key');
  const jobNames = S.jobs.map(j => j.name).join(', ');
  const prompt = `נתח את תלוש העבודה. חלץ:
- תאריך העבודה
- שעת כניסה
- שעת יציאה
${jobNames ? `- שם מקום העבודה (בדוק אם תואם לאחת מ: ${jobNames})` : ''}

החזר JSON בלבד, ללא markdown:
{"date":"YYYY-MM-DD","clockIn":"HH:MM","clockOut":"HH:MM","confidence":"high/medium/low","notes":"","jobName":"שם אם זוהה או null"}

אם לא ניתן לחלץ נתון, השתמש ב-null. תאריך היום: ${fmtDateISO(new Date())}`;

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-API-Key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-opus-4-5',
      max_tokens: 300,
      messages: [{ role: 'user', content: [
        { type: 'image', source: { type: 'base64', media_type: mime, data: b64 } },
        { type: 'text', text: prompt }
      ]}]
    })
  });

  if (!resp.ok) {
    let errMsg = `שגיאת שרת ${resp.status}`;
    try { const eb = await resp.json(); errMsg = eb.error?.message || errMsg; } catch (_) {}
    throw new Error(errMsg);
  }
  const data = await resp.json();
  const text = data.content[0].text.replace(/```json|```/g, '').trim();
  return JSON.parse(text);
}

function fmtHHMM(dateOrISO) {
  const d = dateOrISO instanceof Date ? dateOrISO : new Date(dateOrISO);
  return d.toTimeString().slice(0, 5);
}

function fmtDateISO(date) {
  const d = date instanceof Date ? date : new Date(date);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function fmtMins(totalMins) {
  const h = Math.floor(Math.abs(totalMins) / 60);
  const m = Math.abs(totalMins) % 60;
  return `${h}:${String(m).padStart(2, '0')}`;
}

function fmtMoney(n) {

function parseToDate(dateStr, timeStr) {
  return new Date(`${dateStr}T${timeStr}:00`);

// Convert YYYY-MM-DD → DD/MM/YYYY for display
function fmtDateDisplay(isoDate) {
  if (!isoDate) return '';
  const [y, m, d] = isoDate.split('-');
  return `${d}/${m}/${y}`;
}

// Convert DD/MM/YYYY → YYYY-MM-DD for storage
function displayToISO(display) {
  if (!display) return '';
  const parts = display.replace(/[^0-9]/g, '');
  if (parts.length < 8) return '';
  const d = parts.slice(0,2), m = parts.slice(2,4), y = parts.slice(4,8);
  if (+m < 1 || +m > 12 || +d < 1 || +d > 31) return '';
  return `${y}-${m}-${d}`;
}

// Auto-format date input as user types: DD/MM/YYYY
function onDateDisplayInput(el) {
  let raw = el.value.replace(/[^0-9]/g, '');
  let out = '';
  if (raw.length > 0) out += raw.slice(0,2);
  if (raw.length > 2) out += '/' + raw.slice(2,4);
  if (raw.length > 4) out += '/' + raw.slice(4,8);
  el.value = out;
  // Sync hidden field
  const hidden = qs('entry-date');
  if (hidden) hidden.value = displayToISO(out);
  updateEntryCalc();
}

// Parse DD/MM/YYYY text to ISO for scan results
function parseScanDate(displayOrISO) {
  if (!displayOrISO) return '';
  if (displayOrISO.includes('-')) return displayOrISO; // already ISO
  return displayToISO(displayOrISO);
}

// ═══════════════════════════════════════════════════════════
//  ENTRIES
// ═══════════════════════════════════════════════════════════
async function loadEntries() {
  try {
    const startDate = `${S.year}-${String(S.month + 1).padStart(2, '0')}-01`;
    const endDate   = `${S.year}-${String(S.month + 1).padStart(2, '0')}-31`;
    // Single orderBy avoids needing a composite Firestore index
    const snap = await db.collection('users').doc(S.user.uid).collection('entries')
      .where('date', '>=', startDate).where('date', '<=', endDate)
      .orderBy('date', 'desc').get();
    S.entries = snap.docs.map(d => ({ id: d.id, ...d.data() }))
      .sort((a, b) => b.date.localeCompare(a.date) || (b.clockIn||'').localeCompare(a.clockIn||''));
  } catch (e) {
    console.warn('loadEntries failed (check Firestore rules):', e.code, e.message);
    S.entries = [];
  }
}

async function saveEntryData(data) {
  const ref = db.collection('users').doc(S.user.uid).collection('entries');
  const payload = { ...data, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
  if (data.id) {
    const id = data.id;
    delete payload.id;
    await ref.doc(id).update(payload);
  } else {
    payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
    await ref.add(payload);
  }
}

async function deleteEntryById(entryId) {
  if (!confirm('למחוק רשומה זו?')) return;
  await db.collection('users').doc(S.user.uid).collection('entries').doc(entryId).delete();
  await loadEntries();
  renderHome();
  if (S.currentScreen === 'report') renderReport();
  toast('רשומה נמחקה');
}

// ═══════════════════════════════════════════════════════════
//  ACTIVE SESSION (CLOCK IN/OUT)
// ═══════════════════════════════════════════════════════════
async function initActiveSession() {
  try {
    const doc = await db.collection('users').doc(S.user.uid).get();
    if (doc.exists && doc.data().activeSession) {
      S.activeSession = doc.data().activeSession;
      startTimer();
    }
  } catch (e) {
    console.warn('initActiveSession failed (check Firestore rules):', e.code);
  }
}

async function clockIn(jobId) {
  if (S.activeSession) { toast('כבר עובד! צא קודם.', true); return; }
  const job = getJob(jobId);
  if (!job.id) { toast('עבודה לא נמצאה', true); return; }
  const session = {
    jobId, jobName: job.name, jobColor: job.color || '#3b82f6',
    clockIn: new Date().toISOString()
  };
  loading(true, 'רושם כניסה...');
  try {
    await db.collection('users').doc(S.user.uid).update({ activeSession: session });
    S.activeSession = session;
    startTimer();
    startReminder();
    haptic('medium');
    renderHome();
    toast('✅ כניסה לעבודה: ' + job.name);
  } catch (e) {
    toast('שגיאה: ' + e.message, true);
  } finally {
    loading(false);
  }
}

async function clockOut() {
  if (!S.activeSession) return;
  const now        = new Date();
  const clockInDate = new Date(S.activeSession.clockIn);
  const totalMins  = Math.round((now - clockInDate) / 60000);
  if (totalMins < 1) { toast('עבדת פחות מדקה!', true); return; }
  const job = getJob(S.activeSession.jobId);
  const ec  = calcEarnings(totalMins, job.hourlyRate || 0);

  qs('co-job-name').textContent = S.activeSession.jobName;
  qs('co-in').textContent       = fmtHHMM(clockInDate);
  qs('co-out').textContent      = fmtHHMM(now);
  qs('co-total').textContent    = fmtMins(totalMins);
  qs('co-earn').textContent     = fmtMoney(ec.earnings);

  haptic('light');
  window._pendingClockOut = { now, totalMins, ec, job };
  showModal('clockout-modal');
}

async function confirmClockOut() {
  const { now, totalMins, ec, job } = window._pendingClockOut || {};
  if (!S.activeSession || !now) return;
  const clockInDate = new Date(S.activeSession.clockIn);
  const entry = {
    jobId: S.activeSession.jobId,
    jobName: S.activeSession.jobName,
    jobColor: S.activeSession.jobColor,
    date: fmtDateISO(clockInDate),
    clockIn: fmtHHMM(clockInDate),
    clockOut: fmtHHMM(now),
    totalMins: ec.totalMins,
    earnings: ec.earnings, hourlyRate: job.hourlyRate || 0,
    notes: ''
  };
  loading(true, 'שומר...');
  try {
    await saveEntryData(entry);
    await db.collection('users').doc(S.user.uid).update({ activeSession: null });
    S.activeSession = null;
    stopTimer();
    const ed = new Date(entry.date);
    if (ed.getMonth() === S.month && ed.getFullYear() === S.year) await loadEntries();
    stopReminder();
    haptic('heavy');
    hideModal('clockout-modal');
    renderHome();
    showEarnings(ec.earnings, entry.totalMins, entry.jobName);
  } catch (e) {
    toast('שגיאה: ' + e.message, true);
  } finally {
    loading(false);
  }
}

// ── Timer ──
function startTimer() {
  stopTimer();
  updateTimerDisplay();
  S.timer = setInterval(updateTimerDisplay, 1000);
}

function stopTimer() {
  if (S.timer) { clearInterval(S.timer); S.timer = null; }
}

function updateTimerDisplay() {
  if (!S.activeSession) return;
  const elapsed = Math.floor((Date.now() - new Date(S.activeSession.clockIn)) / 1000);
  const h = Math.floor(elapsed / 3600);
  const m = Math.floor((elapsed % 3600) / 60);
  const sec = elapsed % 60;
  const disp = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  const el = qs('active-timer');
  if (el) el.textContent = disp;
}

// ═══════════════════════════════════════════════════════════
//  RENDER: REPORT
// ═══════════════════════════════════════════════════════════
function renderReport() {
  const now = new Date();
  // Show last 6 months
  const months = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push({ m: d.getMonth(), y: d.getFullYear() });
  }
  const monthSel = months.map(({ m, y }) => {
    const active = m === S.month && y === S.year;
    const yLabel = y !== now.getFullYear() ? ` ${y}` : '';
    return `<button class="month-chip${active?' active':''}" onclick="selectMonth(${m},${y})" ${active?'id="active-month-chip"':''}>${HE_MONTHS[m]}${yLabel}</button>`;
  }).join('');

  // Aggregate
  let totalMins = 0, totalEarn = 0, totalDays = 0;
  const byJob = {};
  const daysSet = new Set();
  S.entries.forEach(e => {
    totalMins += e.totalMins || 0;
    totalEarn += e.earnings || 0;
    daysSet.add(e.date);
    if (!byJob[e.jobId]) byJob[e.jobId] = { name: e.jobName, color: e.jobColor, mins: 0, earn: 0 };
    byJob[e.jobId].mins += e.totalMins || 0;
    byJob[e.jobId].earn += e.earnings  || 0;
  });
  totalDays = daysSet.size;
  const avgHours = totalDays > 0 ? totalMins / totalDays : 0;

  const statsHtml = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-val">${fmtMins(totalMins)}</div>
        <div class="stat-lbl">סה"כ שעות</div>
      </div>
      <div class="stat-card accent">
        <div class="stat-val">${fmtMoney(totalEarn)}</div>
        <div class="stat-lbl">סה"כ הכנסה</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${totalDays}</div>
        <div class="stat-lbl">ימי עבודה</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${fmtMins(Math.round(avgHours))}</div>
        <div class="stat-lbl">ממוצע ליום</div>
      </div>
    </div>`;

  // Per-job breakdown (only if multiple jobs)
  const jobKeys = Object.keys(byJob);
  let jobBreakHtml = '';
  if (jobKeys.length > 1) {
    const rows = jobKeys.map(k => {
      const j = byJob[k];
      return `
        <div class="job-stat-row">
          <div class="dot" style="background:${j.color||'#3b82f6'}"></div>
          <div class="jsr-name">${j.name}</div>
          <div class="jsr-right">
            <div class="jsr-hours">${fmtMins(j.mins)}</div>
            <div class="jsr-earn">${fmtMoney(j.earn)}</div>
          </div>
        </div>`;
    }).join('');
    jobBreakHtml = `<div class="card"><div class="card-title">📊 לפי עבודה</div>${rows}</div>`;
  }

  // Daily breakdown
  const byDate = {};
  S.entries.forEach(e => {
    if (!byDate[e.date]) byDate[e.date] = [];
    byDate[e.date].push(e);
  });

  let dailyHtml = '';
  if (Object.keys(byDate).length === 0) {
    dailyHtml = '<div class="empty-state"><div class="es-icon">📭</div><div class="es-sub">אין רשומות לחודש זה</div></div>';
  } else {
    dailyHtml = Object.keys(byDate).sort((a,b) => b.localeCompare(a)).map(date => {
      const dayEntries = byDate[date];
      let dayMins = 0, dayEarn = 0;
      dayEntries.forEach(e => { dayMins += e.totalMins || 0; dayEarn += e.earnings || 0; });
      const d = new Date(date + 'T12:00:00');
      const dayLabel = d.toLocaleDateString('he-IL', { weekday: 'short', day: 'numeric', month: 'short' });
      const subRows = dayEntries.map(e => `
        <div class="sub-entry" onclick="openEditEntry('${e.id}')">
          <div class="dot sm" style="background:${e.jobColor||'#3b82f6'}"></div>
          <span>${e.jobName}: ${e.clockIn}–${e.clockOut}</span>
          <span class="se-earn">${fmtMoney(e.earnings||0)}</span>
        </div>`).join('');
      return `
        <div class="day-card">
          <div class="day-header">
            <div class="day-label">${dayLabel}</div>
            <div style="display:flex;align-items:center;gap:8px">
              <div class="day-total">${fmtMins(dayMins)} | ${fmtMoney(dayEarn)}</div>
              <button class="copy-day-btn" onclick="copyDay('${date}')">📋 העתק</button>
            </div>
          </div>
          ${subRows}
        </div>`;
    }).join('');
  }

  const chartHtml = renderBarChart(S.entries, S.year, S.month);
  const actionsHtml = `
    <div class="rpt-acts">
      <button class="ra" onclick="exportCSV()">📥 ייצוא CSV</button>
      <button class="ra" onclick="printReport()">🖨️ PDF / הדפסה</button>
      <button class="ra" onclick="shareReport()">📤 שיתוף</button>
    </div>`;
  setHTML('report-content',
    `<div class="month-sel" id="month-sel-row">${monthSel}</div>` +
    actionsHtml + statsHtml + jobBreakHtml +
    chartHtml +
    `<div class="card"><div class="card-title">📅 פירוט יומי</div>${dailyHtml}</div>`
  );
  // Scroll active month chip into view
  setTimeout(() => {
    const chip = qs('active-month-chip');
    if (chip) chip.scrollIntoView({ inline: 'center', behavior: 'smooth' });
  }, 50);
}

async function selectMonth(m, y) {
  S.month = m; S.year = y;
  loading(true, 'טוען...');
  try { await loadEntries(); } finally { loading(false); }
  renderReport();
}

function openAddEntry(prefill) {
  S.editEntry = null;
  qs('entry-modal-title').textContent = 'הוסף רשומה';
  const defaultJobId = prefill.jobId || (S.jobs[0] ? S.jobs[0].id : '');
  const jobOpts = S.jobs.map(j =>
    `<option value="${j.id}" ${j.id===defaultJobId?'selected':''}>${j.name}</option>`).join('');
  setHTML('entry-job', jobOpts);
  const initDateISO = prefill.date || fmtDateISO(new Date());
  const displayEl = qs('entry-date-display');
  const hiddenEl  = qs('entry-date');
  if (displayEl) displayEl.value = fmtDateDisplay(initDateISO);
  if (hiddenEl)  hiddenEl.value  = initDateISO;
  qs('entry-in').value    = prefill.clockIn  || '';
  qs('entry-out').value   = prefill.clockOut || '';
  qs('entry-notes').value = prefill.notes || '';
  qs('entry-del-btn').style.display = 'none';
  updateEntryCalc();
  showModal('entry-modal');
}

function openEditEntry(entryId) {
  const e = S.entries.find(e => e.id === entryId);
  if (!e) return;
  S.editEntry = e;
  qs('entry-modal-title').textContent = 'ערוך רשומה';
  const jobOpts = S.jobs.map(j =>
    `<option value="${j.id}" ${j.id===e.jobId?'selected':''}>${j.name}</option>`).join('');
  setHTML('entry-job', jobOpts);
  const displayEl2 = qs('entry-date-display');
  const hiddenEl2  = qs('entry-date');
  if (displayEl2) displayEl2.value = fmtDateDisplay(e.date);
  if (hiddenEl2)  hiddenEl2.value  = e.date;
  qs('entry-in').value    = e.clockIn;
  qs('entry-out').value   = e.clockOut;
  qs('entry-notes').value = e.notes || '';
  qs('entry-del-btn').style.display = 'block';
  updateEntryCalc();
  showModal('entry-modal');
}

function updateEntryCalc() {
  const jobId   = qs('entry-job').value;
  const dateStr = qs('entry-date').value;
  const inStr   = qs('entry-in').value;
  const outStr  = qs('entry-out').value;
  if (!inStr || !outStr || !dateStr) {
    setHTML('entry-calc', '<div class="calc-box"><div class="calc-empty">הכנס שעות לחישוב אוטומטי</div></div>');
    return;
  }
  let inDate  = parseToDate(dateStr, inStr);
  let outDate = parseToDate(dateStr, outStr);
  if (outDate <= inDate) outDate.setDate(outDate.getDate() + 1); // crosses midnight
  const totalMins = Math.round((outDate - inDate) / 60000);
  if (totalMins <= 0) {
    setHTML('entry-calc', '<div class="calc-box"><div class="calc-err">שעת יציאה לפני כניסה</div></div>');
    return;
  }
  const job  = getJob(jobId);
  const rate = job.hourlyRate || 0;
  const ec   = calcEarnings(totalMins, rate);
  const hoursDecimal = (totalMins / 60).toFixed(2).replace(/\.?0+$/, '');
  let html = `<div class="calc-box">
    <div class="calc-row"><span>⏱ סה"כ שעות</span><strong>${fmtMins(totalMins)} (${hoursDecimal} שעות)</strong></div>`;
  if (rate > 0)
    html += `<div class="calc-row earn"><span>💰 הכנסה</span><strong>${fmtMoney(ec.earnings)}</strong></div>`;
  html += '</div>';
  setHTML('entry-calc', html);
}

async function saveEntryFromModal() {
  const jobId   = qs('entry-job').value;
  const dateStr = qs('entry-date').value;
  const inStr   = qs('entry-in').value;
  const outStr  = qs('entry-out').value;
  const notes   = qs('entry-notes').value.trim();
  if (!jobId) { toast('בחר עבודה', true); return; }
  if (!dateStr || !inStr || !outStr) { toast('מלא תאריך ושעות', true); return; }
  let inDate  = parseToDate(dateStr, inStr);
  let outDate = parseToDate(dateStr, outStr);
  if (outDate < inDate) {
    // Ask user about midnight crossing
    if (!confirm('שעת היציאה לפני הכניסה. האם עבדת דרך חצות? (לחץ OK לאישור)')) return;
    outDate.setDate(outDate.getDate() + 1);
  }
  const totalMins = Math.round((outDate - inDate) / 60000);
  if (totalMins <= 0) { toast('שעות לא תקינות', true); return; }
  const job = getJob(jobId);
  const ec  = calcEarnings(totalMins, job.hourlyRate || 0);
  const entry = {
    jobId, jobName: job.name, jobColor: job.color,
    date: dateStr, clockIn: inStr, clockOut: outStr,
    totalMins: ec.totalMins,
    earnings: ec.earnings, hourlyRate: job.hourlyRate || 0, notes
  };
  if (S.editEntry) entry.id = S.editEntry.id;
  loading(true, 'שומר...');
  try {
    await saveEntryData(entry);
    const ed = new Date(dateStr);
    if (ed.getMonth() === S.month && ed.getFullYear() === S.year) await loadEntries();
    hideModal('entry-modal');
    renderHome();
    if (S.currentScreen === 'report') renderReport();
    toast('✅ רשומה נשמרה!');
  } catch (e) {
    toast('שגיאה: ' + e.message, true);
  } finally {
    loading(false);
  }
}

async function deleteEntryFromModal() {
  if (!S.editEntry) return;
  hideModal('entry-modal');
  await deleteEntryById(S.editEntry.id);
}

async function analyzeWithClaude(b64, mime) {
  const apiKey = localStorage.getItem('anthropic_api_key');
  const prompt = `נתח את תלוש העבודה הזה. חלץ:
- תאריך העבודה
- שעת כניסה
- שעת יציאה

החזר JSON בלבד, ללא markdown ולא הסברים:
{"date":"YYYY-MM-DD","clockIn":"HH:MM","clockOut":"HH:MM","confidence":"high/medium/low","notes":""}

אם לא ניתן לחלץ נתון כלשהו, השתמש ב-null.
תאריך היום: ${fmtDateISO(new Date())}`;

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-API-Key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-opus-4-5',
      max_tokens: 300,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: mime, data: b64 } },
          { type: 'text', text: prompt }
        ]
      }]
    })
  });

  if (!resp.ok) {
    let errMsg = `שגיאת שרת ${resp.status}`;
    try {
      const errBody = await resp.json();
      errMsg = errBody.error?.message || errMsg;
    } catch (_) {}
    throw new Error(errMsg);
  }

  const data = await resp.json();
  const text = data.content[0].text.replace(/```json|```/g, '').trim();
  return JSON.parse(text);
}

window.addEventListener('load', () => {
  // Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .catch(e => console.warn('SW:', e));
  }

  // Firebase guard
  if (typeof firebase === 'undefined') {
    document.body.innerHTML = `
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;
        background:#1d4ed8;color:#fff;font-family:Rubik,Arial,sans-serif;text-align:center;padding:24px;direction:rtl">
        <div>
          <div style="font-size:50px;margin-bottom:16px">&#x26A0;&#xFE0F;</div>
          <div style="font-size:20px;font-weight:700;margin-bottom:8px">שגיאת חיבור</div>
          <div style="font-size:14px;opacity:.8;margin-bottom:20px">Firebase לא נטען — בדוק חיבור לאינטרנט ורענן</div>
          <button onclick="location.reload()" style="background:#fff;color:#1d4ed8;border:none;
            padding:12px 28px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer">
            רענן
          </button>
        </div>
      </div>`;
    return;
  }

  // Initialize Firebase
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
  } catch(e) {
    if (!e.message.includes('already')) console.warn(e);
  }
  auth = firebase.auth();
  db   = firebase.firestore();

  // Start auth listener
  auth.onAuthStateChanged(async user => {
    if (user) {
      S.user = user;
      loading(true, 'טוען...');
      try {
        await loadUserProfile();
        await loadJobs();
        await initActiveSession();
        await loadEntries();
        showApp();
        appExtrasInit();
      } catch (e) {
        console.error(e);
        toast('שגיאה בטעינה: ' + e.message, true);
      } finally {
        loading(false);
      }
    } else {
      S.user = null;
      stopTimer();
      showAuth();
    }
  });
});

function darkModeInit() {
  const saved = localStorage.getItem('wh_dark');
  if (saved) {
    document.documentElement.setAttribute('data-theme', saved);
  }
  updateDarkBtn();
}

function toggleDark() {
  const cur = document.documentElement.getAttribute('data-theme');
  const isDark = cur === 'dark' || (!cur && window.matchMedia('(prefers-color-scheme: dark)').matches);
  const next = isDark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('wh_dark', next);
  updateDarkBtn();
}

function getDarkLabel() {
  const cur = document.documentElement.getAttribute('data-theme');
  const isDark = cur === 'dark' || (!cur && window.matchMedia('(prefers-color-scheme: dark)').matches);
  return isDark ? '🌙 כהה' : '☀️ בהיר';
}

function updateDarkBtn() {
  const cur = document.documentElement.getAttribute('data-theme');
  const isDark = cur === 'dark' || (!cur && window.matchMedia('(prefers-color-scheme: dark)').matches);
  const hdrBtn = qs('dm-btn');
  if (hdrBtn) hdrBtn.textContent = isDark ? '☀️' : '🌙';
}

function haptic(type = 'light') {
  if (!navigator.vibrate) return;
  const p = { light: 30, medium: 50, heavy: [50, 30, 80] };
  navigator.vibrate(p[type] || 30);
}

// ═══════════════════════════════════════════════════════════
//  WEEK SUMMARY
// ═══════════════════════════════════════════════════════════
function renderWeekSummary() {
  const days = [];
  const today = new Date();
  let weekMins = 0, weekEarn = 0;

  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const iso = fmtDateISO(d);
    const dayEntries = S.entries.filter(e => e.date === iso);
    const mins = dayEntries.reduce((s, e) => s + (e.totalMins || 0), 0);
    const earn = dayEntries.reduce((s, e) => s + (e.earnings || 0), 0);
    weekMins += mins;
    weekEarn += earn;
    days.push({ d, iso, mins, earn, isToday: i === 0 });
  }

  const maxMins = Math.max(...days.map(d => d.mins), 480);
  const labels = ['א', 'ב', 'ג', 'ד', 'ה', 'ו', 'ש'];

  const bars = days.map(({ d, mins, isToday }) => {
    const pct = Math.max(mins > 0 ? 6 : 0, Math.round((mins / maxMins) * 100));
    const color = mins > 0 ? (S.jobs[0]?.color || 'var(--blue)') : 'var(--border)';
    const lbl = labels[d.getDay()];
    return `<div class="wb${isToday ? ' today' : ''}">
      <div class="wb-fill" style="height:${pct}%;background:${color}"></div>
      <div class="wb-lbl">${lbl}</div>
    </div>`;
  }).join('');

  return `
    <div class="card">
      <div class="card-header">
        <div class="card-title">📆 השבוע</div>
        <div class="card-sub">${fmtMins(weekMins)} | ${fmtMoney(weekEarn)}</div>
      </div>
      <div class="week-bars">${bars}</div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════
//  BAR CHART
// ═══════════════════════════════════════════════════════════
function renderBarChart(entries, year, month) {
  if (entries.length === 0) return '';
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const byDay = {};
  entries.forEach(e => {
    const day = parseInt(e.date.split('-')[2]);
    if (!byDay[day]) byDay[day] = [];
    byDay[day].push(e);
  });

  const maxMins = Math.max(...Object.values(byDay).map(d => d.reduce((s, e) => s + e.totalMins, 0)), 480);
  const BW = 16, GAP = 3, ML = 28, MR = 8, MT = 8, MB = 20;
  const chartW = daysInMonth * (BW + GAP) + ML + MR;
  const chartH = 110 + MB;
  const innerH = chartH - MT - MB;

  // Y axis labels
  const yLabels = [0, 4, 8].map(h => {
    const y = MT + innerH - (h / (maxMins / 60)) * innerH;
    return `<text x="${ML - 4}" y="${y + 4}" font-size="8" fill="var(--text3)" text-anchor="end">${h}h</text>
            <line x1="${ML}" y1="${y}" x2="${chartW - MR}" y2="${y}" stroke="var(--border)" stroke-width=".5" stroke-dasharray="3,3"/>`;
  }).join('');

  let bars = '';
  const jobColors = {};
  for (let day = 1; day <= daysInMonth; day++) {
    const dayData = byDay[day];
    if (!dayData) continue;
    const x = ML + (day - 1) * (BW + GAP);
    let stackY = MT + innerH;
    dayData.forEach(e => {
      const h = (e.totalMins || 0) / maxMins * innerH;
      if (h < 0.5) return;
      stackY -= h;
      const col = e.jobColor || '#3b82f6';
      jobColors[e.jobId] = { color: col, name: e.jobName };
      bars += `<rect x="${x}" y="${stackY.toFixed(1)}" width="${BW}" height="${h.toFixed(1)}" fill="${col}" rx="2"/>`;
    });
    if (day === 1 || day % 5 === 0 || day === daysInMonth) {
      bars += `<text x="${x + BW / 2}" y="${chartH - 4}" font-size="8" fill="var(--text3)" text-anchor="middle">${day}</text>`;
    }
  }

  const legend = Object.values(jobColors).map(j =>
    `<div class="cl-item"><div class="cl-dot" style="background:${j.color}"></div>${j.name}</div>`).join('');

  return `
    <div class="card">
      <div class="card-title">📈 גרף שעות לפי יום</div>
      <div class="chart-scroll" id="chart-wrap">
        <svg width="${chartW}" height="${chartH}" style="display:block">
          <line x1="${ML}" y1="${MT}" x2="${ML}" y2="${MT + innerH}" stroke="var(--border)" stroke-width="1"/>
          ${yLabels}${bars}
        </svg>
      </div>
      ${legend ? `<div class="chart-legend">${legend}</div>` : ''}
    </div>`;
}
