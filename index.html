<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WorkHours">
<meta name="theme-color" content="#1d4ed8">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<title>WorkHours</title>
<style>
:root{
  --blue:#1d4ed8;--blue-l:#3b82f6;--blue-d:#1e3a8a;
  --green:#059669;--red:#dc2626;--amber:#d97706;
  --bg:#eef2ff;--card:#fff;--text:#0f172a;
  --text2:#475569;--text3:#94a3b8;--border:#e2e8f0;
  --shadow:0 1px 8px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.04);
  --shadow-md:0 4px 20px rgba(0,0,0,.1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Rubik',-apple-system,Arial,sans-serif;background:var(--bg);color:var(--text);direction:rtl;overflow-x:hidden}

/* ──────── APP SHELL ──────── */
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:var(--bg);position:relative}
.screens-wrap{flex:1;overflow:hidden;position:relative}
.main-screen{display:none;height:100%;overflow-y:auto;padding:14px 14px calc(72px + env(safe-area-inset-bottom));-webkit-overflow-scrolling:touch}
.main-screen.active{display:block}

/* ──────── HEADER ──────── */
.header{background:linear-gradient(135deg,var(--blue-d),var(--blue));color:#fff;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.header-brand{display:flex;align-items:center;gap:8px}
.header-logo{font-size:22px}
.header-title{font-size:17px;font-weight:800;letter-spacing:.3px}
.version-badge{font-size:9px;background:rgba(255,255,255,.2);padding:2px 7px;border-radius:10px;font-weight:600}
.header-user{display:flex;align-items:center;gap:8px}
.user-name-hdr{font-size:12px;opacity:.85;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdr-avatar{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;cursor:pointer}

/* ──────── BOTTOM NAV ──────── */
.bottom-nav{display:flex;background:#fff;border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom);flex-shrink:0;box-shadow:0 -2px 12px rgba(0,0,0,.06)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 8px;border:none;background:none;color:var(--text3);font-size:10px;font-family:inherit;font-weight:600;cursor:pointer;transition:color .15s}
.nav-btn .ni{font-size:21px;line-height:1}
.nav-btn.active{color:var(--blue)}

/* ──────── CARDS ──────── */
.card{background:var(--card);border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:12px}
.card-header .card-title{margin-bottom:0}
.card-sub{font-size:13px;color:var(--blue);font-weight:700}

/* ──────── ACTIVE SESSION ──────── */
.active-card{background:linear-gradient(135deg,var(--blue-d) 0%,var(--blue) 100%);border-radius:16px;padding:16px;margin-bottom:12px;color:#fff;box-shadow:0 6px 24px rgba(29,78,216,.35)}
.active-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.active-label{font-size:10px;opacity:.7;text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px}
.active-job-name{font-size:20px;font-weight:800}
.active-since{font-size:12px;opacity:.65;margin-top:2px}
.active-timer-box{background:rgba(255,255,255,.15);border-radius:12px;padding:8px 14px;text-align:center}
.active-timer{font-size:26px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:1px}

/* ──────── BUTTONS ──────── */
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border-radius:12px;border:none;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;width:100%;transition:transform .1s,opacity .1s}
.btn:active{transform:scale(.97);opacity:.85}
.btn-primary{background:var(--blue);color:#fff}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-outline{background:transparent;color:var(--blue);border:2px solid var(--blue)}
.btn-ghost{background:var(--bg);color:var(--text)}
.btn-sm{padding:8px 14px;font-size:13px}
.btn-icon{background:var(--blue);color:#fff;border:none;padding:6px 12px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.mt8{margin-top:8px}

/* ──────── FORMS ──────── */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:5px}
.form-input{width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:10px;font-size:15px;color:var(--text);background:#fff;font-family:inherit;direction:rtl;transition:border-color .15s}
.form-input:focus{outline:none;border-color:var(--blue)}
select.form-input{cursor:pointer}

/* ──────── ENTRY ROWS ──────── */
.entry-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer}
.entry-row:last-child{border-bottom:none;padding-bottom:0}
.er-details{flex:1}
.er-job{font-size:14px;font-weight:600}
.er-time{font-size:12px;color:var(--text3);margin-top:2px}
.er-right{text-align:left;flex-shrink:0}
.er-hours{font-size:15px;font-weight:700;color:var(--blue)}
.er-earn{font-size:11px;color:var(--green);font-weight:600;margin-top:2px}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot.sm{width:7px;height:7px}
.ot-badge{display:inline-block;font-size:9px;font-weight:700;background:#fef3c7;color:#92400e;padding:2px 5px;border-radius:4px;margin-top:2px}

/* ──────── JOB CLOCK BUTTONS ──────── */
.job-btns-grid{display:flex;flex-direction:column;gap:8px}
.job-btn{display:flex;align-items:center;gap:10px;padding:13px 16px;border-radius:12px;border:2px solid;background:#fff;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:transform .1s,box-shadow .1s;text-align:right;width:100%}
.job-btn:active{transform:scale(.97)}
.job-btn-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ──────── STATS ──────── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:var(--card);border-radius:14px;padding:14px;text-align:center;box-shadow:var(--shadow)}
.stat-card.accent{background:var(--blue)}
.stat-card.accent .stat-val{color:#fff}
.stat-card.accent .stat-lbl{color:rgba(255,255,255,.7)}
.stat-card.warn{background:#fffbeb}
.stat-card.warn .stat-val{color:var(--amber)}
.stat-val{font-size:20px;font-weight:800;color:var(--blue)}
.stat-lbl{font-size:10px;color:var(--text3);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}

/* ──────── MONTH SELECTOR ──────── */
.month-sel{display:flex;gap:8px;overflow-x:auto;padding:2px 0 10px;scrollbar-width:none}
.month-sel::-webkit-scrollbar{display:none}
.month-chip{flex-shrink:0;padding:7px 16px;border-radius:20px;border:2px solid var(--border);background:#fff;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;white-space:nowrap;color:var(--text2)}
.month-chip.active{background:var(--blue);color:#fff;border-color:var(--blue)}

/* ──────── REPORT ──────── */
.day-card{background:var(--bg);border-radius:10px;padding:10px;margin-bottom:8px}
.day-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.day-label{font-size:13px;font-weight:700}
.day-total{font-size:12px;color:var(--blue);font-weight:700}
.sub-entry{display:flex;align-items:center;gap:8px;font-size:12px;padding:5px 0;color:var(--text2);cursor:pointer}
.se-earn{color:var(--green);font-weight:600;margin-right:auto}
.job-stat-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.job-stat-row:last-child{border-bottom:none}
.jsr-name{flex:1;font-weight:600;font-size:14px}
.jsr-right{text-align:left}
.jsr-hours{font-size:14px;font-weight:700;color:var(--blue)}
.jsr-earn{font-size:12px;color:var(--green);font-weight:600}

/* ──────── MODAL ──────── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:flex-end;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:22px 22px 0 0;padding:20px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.modal-title{font-size:18px;font-weight:700}
.modal-close{width:30px;height:30px;border-radius:50%;border:none;background:var(--bg);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}

/* ──────── CALC PREVIEW ──────── */
.calc-box{background:var(--bg);border-radius:10px;padding:10px;margin-bottom:14px}
.calc-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid var(--border)}
.calc-row:last-child{border-bottom:none}
.calc-row.ot{color:var(--amber)}
.calc-row.earn{color:var(--green);font-weight:700;font-size:15px}
.calc-empty,.calc-err{font-size:13px;color:var(--text3);text-align:center;padding:8px 0}
.calc-err{color:var(--red)}

/* ──────── COLOR PICKER ──────── */
.color-picker{display:flex;flex-wrap:wrap;gap:10px}
.cswatch{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:border-color .15s,transform .1s}
.cswatch.active{border-color:var(--text);transform:scale(1.15)}

/* ──────── SETTINGS ──────── */
.profile-row{display:flex;align-items:center;gap:12px}
.profile-avatar{width:44px;height:44px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0}
.profile-name{font-size:16px;font-weight:700}
.profile-email{font-size:12px;color:var(--text3);margin-top:2px}
.job-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer}
.job-item:last-child{border-bottom:none}
.ji-details{flex:1}
.ji-name{font-size:15px;font-weight:600}
.ji-rate{font-size:12px;color:var(--text3);margin-top:2px}
.ji-arrow{color:var(--text3);font-size:22px}
.ot-rules{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.ot-rule{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg);border-radius:8px;font-size:13px}
.ot-rule strong{color:var(--blue)}
.info-note{font-size:11px;color:var(--text3);line-height:1.6;margin-top:6px}
.about-info{font-size:13px;color:var(--text2);line-height:2}

/* ──────── AUTH ──────── */
#auth-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;background:linear-gradient(160deg,var(--blue-d) 0%,var(--blue) 55%,var(--blue-l) 100%)}
.auth-logo{text-align:center;margin-bottom:24px}
.auth-logo-icon{font-size:60px}
.auth-logo-title{font-size:30px;font-weight:800;color:#fff;margin-top:8px;letter-spacing:.5px}
.auth-logo-sub{font-size:13px;color:rgba(255,255,255,.75);margin-top:4px}
.auth-version{font-size:10px;color:rgba(255,255,255,.4);margin-top:6px}
.auth-card{background:#fff;border-radius:24px;padding:24px 20px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.tabs{display:flex;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:18px}
.tab{flex:1;padding:9px;border-radius:8px;border:none;font-size:13px;font-weight:600;font-family:inherit;color:var(--text3);cursor:pointer;transition:all .15s;background:transparent}
.tab.active{background:#fff;color:var(--blue);box-shadow:0 1px 4px rgba(0,0,0,.1)}

/* ──────── SCAN ──────── */
#camera-container{position:relative;border-radius:14px;overflow:hidden;background:#000;aspect-ratio:4/3;margin-bottom:10px}
#camera-video{width:100%;height:100%;object-fit:cover;display:block}
.camera-btns{display:flex;gap:10px;margin-top:6px}
.gallery-drop{border:2px dashed var(--border);border-radius:14px;padding:40px 20px;text-align:center;cursor:pointer;background:#fff;transition:border-color .15s}
.gallery-drop:hover{border-color:var(--blue)}
.gd-icon{font-size:40px;margin-bottom:8px}
.gd-text{font-size:14px;font-weight:600;color:var(--text2)}
.gd-sub{font-size:12px;color:var(--text3);margin-top:4px}
.scan-loading{background:#fff;border-radius:14px;padding:20px;display:flex;align-items:center;gap:10px;justify-content:center;font-size:14px;color:var(--text2)}
.scan-err{background:#fff5f5;border-radius:14px;padding:16px;color:var(--red);font-size:13px;text-align:center}
.scan-manual,.scan-success{background:#fff;border-radius:14px;padding:16px}
.ss-title{font-size:16px;font-weight:700;margin-bottom:4px}
.ss-conf{font-size:12px;color:var(--text3);margin-bottom:14px}
.sm-title{font-size:15px;font-weight:700;color:var(--text2);margin-bottom:6px;text-align:center}
.sm-sub{font-size:13px;color:var(--text3);text-align:center}
.scan-img-preview{width:100%;border-radius:12px;margin-bottom:12px;display:block;max-height:220px;object-fit:cover}

/* ──────── CLOCK OUT MODAL ──────── */
.co-preview{background:var(--bg);border-radius:12px;padding:14px;margin-bottom:14px}
.co-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)}
.co-row:last-child{border-bottom:none}
.co-label{font-size:13px;color:var(--text2)}
.co-val{font-size:14px;font-weight:700}
.co-earn{color:var(--green);font-size:18px;font-weight:800}
.co-job-header{font-size:20px;font-weight:800;margin-bottom:14px}

/* ──────── LOADING / TOAST ──────── */
#loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.92);display:none;align-items:center;justify-content:center;z-index:200;flex-direction:column;gap:12px}
#loading-overlay.show{display:flex}
.ld-msg{font-size:14px;color:var(--text2);font-weight:500}
#toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:300;opacity:0;transition:opacity .25s;max-width:90vw;text-align:center;pointer-events:none;white-space:pre-line}
#toast.show{opacity:1}
#toast.err{background:var(--red)}
.spinner{width:22px;height:22px;border:3px solid rgba(255,255,255,.3);border-radius:50%;border-top-color:#fff;animation:spin .7s linear infinite}
.spinner.dark{border-color:rgba(29,78,216,.15);border-top-color:var(--blue)}
@keyframes spin{to{transform:rotate(360deg)}}

/* ──────── EMPTY STATE ──────── */
.empty-state{text-align:center;padding:24px 12px}
.es-icon{font-size:42px;margin-bottom:8px}
.es-title{font-size:16px;font-weight:700;color:var(--text2);margin-bottom:4px}
.es-sub{font-size:13px;color:var(--text3)}

/* ──────── MISC ──────── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sep{height:1px;background:var(--border);margin:12px 0}
.text-center{text-align:center}
</style>
</head>
<body>

<!-- LOADING OVERLAY -->
<div id="loading-overlay">
  <div class="spinner dark"></div>
  <div class="ld-msg" id="loading-msg">טוען...</div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- ═══════════════ AUTH SCREEN ═══════════════ -->
<div id="auth-screen">
  <div class="auth-logo">
    <div class="auth-logo-icon">⏱</div>
    <div class="auth-logo-title">WorkHours</div>
    <div class="auth-logo-sub">ניהול שעות עבודה</div>
    <div class="auth-version">v1.0.0</div>
  </div>

  <div class="auth-card">
    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchAuthTab('login')">התחברות</button>
      <button class="tab" id="tab-reg" onclick="switchAuthTab('register')">הרשמה</button>
    </div>

    <!-- Login Form -->
    <div id="login-form">
      <div class="form-group">
        <label class="form-label">אימייל</label>
        <input type="email" class="form-input" id="login-email" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">סיסמה</label>
        <input type="password" class="form-input" id="login-pwd" placeholder="••••••" autocomplete="current-password"
          onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn btn-primary" onclick="doLogin()">🔑 התחבר</button>
    </div>

    <!-- Register Form -->
    <div id="reg-form" style="display:none">
      <div class="form-group">
        <label class="form-label">שם מלא</label>
        <input type="text" class="form-input" id="reg-name" placeholder="ישראל ישראלי" autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label">אימייל</label>
        <input type="email" class="form-input" id="reg-email" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">סיסמה (לפחות 6 תווים)</label>
        <input type="password" class="form-input" id="reg-pwd" placeholder="••••••" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-label">אימות סיסמה</label>
        <input type="password" class="form-input" id="reg-pwd2" placeholder="••••••">
      </div>
      <button class="btn btn-primary" onclick="doRegister()">✨ הירשם</button>
    </div>
  </div>
</div>

<!-- ═══════════════ MAIN APP ═══════════════ -->
<div id="app" style="display:none">
  <!-- Header -->
  <div class="header">
    <div class="header-brand">
      <span class="header-logo">⏱</span>
      <span class="header-title">WorkHours</span>
      <span class="version-badge">v1.0.0</span>
    </div>
    <div class="header-user">
      <span class="user-name-hdr" id="user-name-hdr"></span>
      <div class="hdr-avatar" id="hdr-avatar" onclick="showScreen('settings')">?</div>
    </div>
  </div>

  <!-- Screens -->
  <div class="screens-wrap">

    <!-- HOME -->
    <div id="home-screen" class="main-screen active">
      <div id="home-content">
        <div style="text-align:center;padding:40px"><div class="spinner dark"></div></div>
      </div>
    </div>

    <!-- REPORT -->
    <div id="report-screen" class="main-screen">
      <div id="report-content"></div>
    </div>

    <!-- SCAN -->
    <div id="scan-screen" class="main-screen">
      <div id="scan-content"></div>
    </div>

    <!-- SETTINGS -->
    <div id="settings-screen" class="main-screen">
      <div id="settings-content"></div>
    </div>

  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-home" onclick="showScreen('home')">
      <span class="ni">🏠</span><span>בית</span>
    </button>
    <button class="nav-btn" id="nav-report" onclick="showScreen('report')">
      <span class="ni">📊</span><span>דוח</span>
    </button>
    <button class="nav-btn" id="nav-scan" onclick="showScreen('scan')">
      <span class="ni">📷</span><span>סרוק</span>
    </button>
    <button class="nav-btn" id="nav-settings" onclick="showScreen('settings')">
      <span class="ni">⚙️</span><span>הגדרות</span>
    </button>
  </nav>
</div>

<!-- ═══════════════ MODAL: ENTRY ═══════════════ -->
<div id="entry-modal" class="modal-overlay" onclick="if(event.target===this)hideModal('entry-modal')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="entry-modal-title">הוסף רשומה</div>
      <button class="modal-close" onclick="hideModal('entry-modal')">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">עבודה</label>
      <select class="form-input" id="entry-job" onchange="updateEntryCalc()">

<script>
// ═══════════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════════
const APP_VERSION = '1.0.0';
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBAcjqAATlZ5ZWTC8VfbzCoHoY6zLKbw6o",
  authDomain: "workhours-9815f.firebaseapp.com",
  projectId: "workhours-9815f",
  storageBucket: "workhours-9815f.firebasestorage.app",
  messagingSenderId: "763760593625",
  appId: "1:763760593625:web:1c4178c076a1eaf3c74cc8"
};
const JOB_COLORS = ['#3b82f6','#10b981','#8b5cf6','#f59e0b','#ef4444','#06b6d4','#ec4899','#84cc16'];
const HE_MONTHS = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

// ═══════════════════════════════════════════════════════════
//  FIREBASE
// ═══════════════════════════════════════════════════════════
firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db = firebase.firestore();

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
const S = {
  user: null,
  userName: '',
  jobs: [],
  entries: [],
  activeSession: null,
  month: new Date().getMonth(),
  year: new Date().getFullYear(),
  timer: null,
  editJob: null,
  editEntry: null,
  camera: null,
  scanTab: 'camera',
  currentScreen: 'home',
};

// ═══════════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════════
const qs = id => document.getElementById(id);
const qEl = sel => document.querySelector(sel);

function setHTML(id, html) {
  const el = qs(id);
  if (el) el.innerHTML = html;
  return el;
}

let _toastTm;
function toast(msg, isErr = false) {
  const t = qs('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  clearTimeout(_toastTm);
  _toastTm = setTimeout(() => { t.className = 'toast'; }, 3200);
}

function loading(show, msg = 'טוען...') {
  const el = qs('loading-overlay');
  el.classList.toggle('show', show);
  qs('loading-msg').textContent = msg;
}

function fmtHHMM(dateOrISO) {
  const d = dateOrISO instanceof Date ? dateOrISO : new Date(dateOrISO);
  return d.toTimeString().slice(0, 5);
}

function fmtDateISO(date) {
  const d = date instanceof Date ? date : new Date(date);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function fmtMins(totalMins) {
  const h = Math.floor(Math.abs(totalMins) / 60);
  const m = Math.abs(totalMins) % 60;
  return `${h}:${String(m).padStart(2, '0')}`;
}

function fmtMoney(n) {
  return `₪${(+n).toFixed(2)}`;
}

function parseToDate(dateStr, timeStr) {
  return new Date(`${dateStr}T${timeStr}:00`);
}

// ═══════════════════════════════════════════════════════════
//  OVERTIME CALCULATION (Israeli law, per job per day)
// ═══════════════════════════════════════════════════════════
function calcEarnings(totalMins, hourlyRate) {
  const h = totalMins / 60;
  let reg = 0, ot1 = 0, ot2 = 0;
  if (h <= 8)       { reg = h; }
  else if (h <= 10) { reg = 8; ot1 = h - 8; }
  else              { reg = 8; ot1 = 2; ot2 = h - 10; }
  return {
    totalMins,
    regMins:  Math.round(reg * 60),
    ot1Mins:  Math.round(ot1 * 60),
    ot2Mins:  Math.round(ot2 * 60),
    earnings: Math.round((reg * hourlyRate + ot1 * hourlyRate * 1.25 + ot2 * hourlyRate * 1.5) * 100) / 100
  };
}

// ═══════════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.main-screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const scr = qs(id + '-screen');
  if (scr) scr.classList.add('active');
  const nb = qs('nav-' + id);
  if (nb) nb.classList.add('active');
  S.currentScreen = id;
  if (id === 'home')     renderHome();
  if (id === 'report')   renderReport();
  if (id === 'scan')     initScan();
  if (id === 'settings') renderSettings();
}

function showModal(id)  { qs(id).classList.add('active'); }
function hideModal(id)  { qs(id).classList.remove('active'); }

function showAuth() {
  qs('auth-screen').style.display = 'flex';
  qs('app').style.display = 'none';
}

function showApp() {
  qs('auth-screen').style.display = 'none';
  qs('app').style.display = 'flex';
  showScreen('home');
}

function switchAuthTab(tab) {
  qs('login-form').style.display = tab === 'login' ? 'block' : 'none';
  qs('reg-form').style.display = tab === 'register' ? 'block' : 'none';
  qs('tab-login').classList.toggle('active', tab === 'login');
  qs('tab-reg').classList.toggle('active', tab === 'register');
}

// ═══════════════════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════════════════
auth.onAuthStateChanged(async user => {
  if (user) {
    S.user = user;
    loading(true, 'טוען...');
    try {
      await loadUserProfile();
      await loadJobs();
      await initActiveSession();
      await loadEntries();
      showApp();
    } catch (e) {
      console.error(e);
      toast('שגיאה בטעינה: ' + e.message, true);
    } finally {
      loading(false);
    }
  } else {
    S.user = null;
    stopTimer();
    showAuth();
  }
});

async function doLogin() {
  const email = qs('login-email').value.trim();
  const pwd   = qs('login-pwd').value;
  if (!email || !pwd) { toast('מלא אימייל וסיסמה', true); return; }
  try {
    loading(true, 'מתחבר...');
    await auth.signInWithEmailAndPassword(email, pwd);
  } catch (e) {
    loading(false);
    const msgs = {
      'auth/user-not-found': 'משתמש לא נמצא',
      'auth/wrong-password': 'סיסמה שגויה',
      'auth/invalid-email': 'אימייל לא תקין',
      'auth/invalid-credential': 'אימייל או סיסמה שגויים',
      'auth/too-many-requests': 'יותר מדי ניסיונות, נסה שוב מאוחר יותר',
    };
    toast(msgs[e.code] || e.message, true);
  }
}

async function doRegister() {
  const name  = qs('reg-name').value.trim();
  const email = qs('reg-email').value.trim();
  const pwd   = qs('reg-pwd').value;
  const pwd2  = qs('reg-pwd2').value;
  if (!name || !email || !pwd) { toast('מלא את כל השדות', true); return; }
  if (pwd !== pwd2) { toast('הסיסמאות לא תואמות', true); return; }
  if (pwd.length < 6) { toast('סיסמה חייבת לפחות 6 תווים', true); return; }
  try {
    loading(true, 'רושם...');
    const cred = await auth.createUserWithEmailAndPassword(email, pwd);
    await db.collection('users').doc(cred.user.uid).set({
      name, email, activeSession: null,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    await cred.user.updateProfile({ displayName: name });
  } catch (e) {
    loading(false);
    const msgs = {
      'auth/email-already-in-use': 'אימייל כבר קיים',
      'auth/weak-password': 'סיסמה חלשה מדי',
    };
    toast(msgs[e.code] || e.message, true);
  }
}

async function doLogout() {
  if (!confirm('בטוח שרוצה להתנתק?')) return;
  stopTimer();
  await auth.signOut();
}

// ═══════════════════════════════════════════════════════════
//  USER PROFILE
// ═══════════════════════════════════════════════════════════
async function loadUserProfile() {
  const doc = await db.collection('users').doc(S.user.uid).get();
  if (doc.exists) {
    S.userName = doc.data().name || S.user.displayName || S.user.email;
  } else {
    S.userName = S.user.displayName || S.user.email;
    await db.collection('users').doc(S.user.uid).set({
      name: S.userName, email: S.user.email, activeSession: null,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  }
  const initials = S.userName.charAt(0).toUpperCase();
  const nameEl = qs('user-name-hdr');
  const avatarEl = qs('hdr-avatar');
  if (nameEl) nameEl.textContent = S.userName;
  if (avatarEl) avatarEl.textContent = initials;
}

// ═══════════════════════════════════════════════════════════
//  JOBS
// ═══════════════════════════════════════════════════════════
async function loadJobs() {
  const snap = await db.collection('users').doc(S.user.uid)
    .collection('jobs').orderBy('createdAt', 'asc').get();
  S.jobs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

function getJob(id) {
  return S.jobs.find(j => j.id === id) || {};
}

async function saveJobData(data) {
  const ref = db.collection('users').doc(S.user.uid).collection('jobs');
  if (data.id) {
    await ref.doc(data.id).update({ name: data.name, color: data.color, hourlyRate: data.hourlyRate });
  } else {
    await ref.add({
      name: data.name, color: data.color, hourlyRate: data.hourlyRate,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  }
  await loadJobs();
}

async function deleteJobById(jobId) {
  if (!confirm('למחוק עבודה זו?\n(רשומות קיימות לא יימחקו)')) return;
  await db.collection('users').doc(S.user.uid).collection('jobs').doc(jobId).delete();
  await loadJobs();
  renderSettings();
  toast('עבודה נמחקה');
}

// ═══════════════════════════════════════════════════════════
//  ENTRIES
// ═══════════════════════════════════════════════════════════
async function loadEntries() {
  const startDate = `${S.year}-${String(S.month + 1).padStart(2, '0')}-01`;
  const endDate   = `${S.year}-${String(S.month + 1).padStart(2, '0')}-31`;
  const snap = await db.collection('users').doc(S.user.uid).collection('entries')
    .where('date', '>=', startDate).where('date', '<=', endDate)
    .orderBy('date', 'desc').orderBy('clockIn', 'desc').get();
  S.entries = snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

async function saveEntryData(data) {
  const ref = db.collection('users').doc(S.user.uid).collection('entries');
  const payload = { ...data, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
  if (data.id) {
    const id = data.id;
    delete payload.id;
    await ref.doc(id).update(payload);
  } else {
    payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
    await ref.add(payload);
  }
}

async function deleteEntryById(entryId) {
  if (!confirm('למחוק רשומה זו?')) return;
  await db.collection('users').doc(S.user.uid).collection('entries').doc(entryId).delete();
  await loadEntries();
  renderHome();
  if (S.currentScreen === 'report') renderReport();
  toast('רשומה נמחקה');
}

// ═══════════════════════════════════════════════════════════
//  ACTIVE SESSION (CLOCK IN/OUT)
// ═══════════════════════════════════════════════════════════
async function initActiveSession() {
  const doc = await db.collection('users').doc(S.user.uid).get();
  if (doc.exists && doc.data().activeSession) {
    S.activeSession = doc.data().activeSession;
    startTimer();
  }
}

async function clockIn(jobId) {
  if (S.activeSession) { toast('כבר עובד! צא קודם.', true); return; }
  const job = getJob(jobId);
  if (!job.id) { toast('עבודה לא נמצאה', true); return; }
  const session = {
    jobId, jobName: job.name, jobColor: job.color || '#3b82f6',
    clockIn: new Date().toISOString()
  };
  loading(true, 'רושם כניסה...');
  try {
    await db.collection('users').doc(S.user.uid).update({ activeSession: session });
    S.activeSession = session;
    startTimer();
    renderHome();
    toast('✅ כניסה לעבודה: ' + job.name);
  } catch (e) {
    toast('שגיאה: ' + e.message, true);
  } finally {
    loading(false);
  }
}

async function clockOut() {
  if (!S.activeSession) return;
  const now        = new Date();
  const clockInDate = new Date(S.activeSession.clockIn);
  const totalMins  = Math.round((now - clockInDate) / 60000);
  if (totalMins < 1) { toast('עבדת פחות מדקה!', true); return; }
  const job = getJob(S.activeSession.jobId);
  const ec  = calcEarnings(totalMins, job.hourlyRate || 0);

  qs('co-job-name').textContent = S.activeSession.jobName;
  qs('co-in').textContent       = fmtHHMM(clockInDate);
  qs('co-out').textContent      = fmtHHMM(now);
  qs('co-total').textContent    = fmtMins(totalMins);
  qs('co-earn').textContent     = fmtMoney(ec.earnings);

  const otMins = ec.ot1Mins + ec.ot2Mins;
  if (otMins > 0) {
    qs('co-ot-row').style.display = 'flex';
    qs('co-ot').textContent = fmtMins(otMins);
  } else {
    qs('co-ot-row').style.display = 'none';
  }

  window._pendingClockOut = { now, totalMins, ec, job };
  showModal('clockout-modal');
}

async function confirmClockOut() {
  const { now, totalMins, ec, job } = window._pendingClockOut || {};
  if (!S.activeSession || !now) return;
  const clockInDate = new Date(S.activeSession.clockIn);
  const entry = {
    jobId: S.activeSession.jobId,
    jobName: S.activeSession.jobName,
    jobColor: S.activeSession.jobColor,
    date: fmtDateISO(clockInDate),
    clockIn: fmtHHMM(clockInDate),
    clockOut: fmtHHMM(now),
    totalMins: ec.totalMins, regMins: ec.regMins,
    ot1Mins: ec.ot1Mins, ot2Mins: ec.ot2Mins,
    earnings: ec.earnings, hourlyRate: job.hourlyRate || 0,
    notes: ''
  };
  loading(true, 'שומר...');
  try {
    await saveEntryData(entry);
    await db.collection('users').doc(S.user.uid).update({ activeSession: null });
    S.activeSession = null;
    stopTimer();
    const ed = new Date(entry.date);
    if (ed.getMonth() === S.month && ed.getFullYear() === S.year) await loadEntries();
    hideModal('clockout-modal');
    renderHome();
    toast('✅ יצאת מעבודה!\n' + fmtMoney(ec.earnings));
  } catch (e) {
    toast('שגיאה: ' + e.message, true);
  } finally {
    loading(false);
  }
}

// ── Timer ──
function startTimer() {
  stopTimer();
  updateTimerDisplay();
  S.timer = setInterval(updateTimerDisplay, 1000);
}

function stopTimer() {
  if (S.timer) { clearInterval(S.timer); S.timer = null; }
}

function updateTimerDisplay() {
  if (!S.activeSession) return;
  const elapsed = Math.floor((Date.now() - new Date(S.activeSession.clockIn)) / 1000);
  const h = Math.floor(elapsed / 3600);
  const m = Math.floor((elapsed % 3600) / 60);
  const sec = elapsed % 60;
  const disp = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  const el = qs('active-timer');
  if (el) el.textContent = disp;
}

// ═══════════════════════════════════════════════════════════
//  RENDER: HOME
// ═══════════════════════════════════════════════════════════
function renderHome() {
  const today = fmtDateISO(new Date());
  const todayEntries = S.entries.filter(e => e.date === today);

  // Active session block
  let activeHtml = '';
  if (S.activeSession) {
    const inTime = fmtHHMM(new Date(S.activeSession.clockIn));
    activeHtml = `
      <div class="active-card">
        <div class="active-top">
          <div>
            <div class="active-label">⏱ עובד עכשיו</div>
            <div class="active-job-name">${S.activeSession.jobName}</div>
            <div class="active-since">כניסה ${inTime}</div>
          </div>
          <div class="active-timer-box">
            <div id="active-timer" class="active-timer">00:00:00</div>
          </div>
        </div>
        <button class="btn btn-danger" onclick="clockOut()">🚪 יציאה מעבודה</button>
      </div>`;
  }

  // Today summary
  let todayMins = 0, todayEarn = 0;
  todayEntries.forEach(e => { todayMins += e.totalMins || 0; todayEarn += e.earnings || 0; });

  let todayHtml = '';
  if (todayEntries.length > 0) {
    const rows = todayEntries.map(e => `
      <div class="entry-row" onclick="openEditEntry('${e.id}')">
        <div class="dot" style="background:${e.jobColor||'#3b82f6'}"></div>
        <div class="er-details">
          <div class="er-job">${e.jobName}</div>
          <div class="er-time">${e.clockIn} – ${e.clockOut}</div>
        </div>
        <div class="er-right">
          <div class="er-hours">${fmtMins(e.totalMins)}</div>
          ${e.earnings > 0 ? `<div class="er-earn">${fmtMoney(e.earnings)}</div>` : ''}
          ${(e.ot1Mins||0) + (e.ot2Mins||0) > 0 ? '<span class="ot-badge">נוספות</span>' : ''}
        </div>
      </div>`).join('');
    todayHtml = `
      <div class="card">
        <div class="card-header">
          <div class="card-title">📅 היום</div>
          <div class="card-sub">${fmtMins(todayMins)} | ${fmtMoney(todayEarn)}</div>
        </div>
        ${rows}
      </div>`;
  }

  // Job clock-in buttons
  let clockBtns = '';
  if (S.jobs.length > 0 && !S.activeSession) {
    const btns = S.jobs.map(j => `
      <button class="job-btn" style="border-color:${j.color};color:${j.color}" onclick="clockIn('${j.id}')">
        <div class="job-btn-dot" style="background:${j.color}"></div>

      </button>`).join('');
    clockBtns = `
      <div class="card">
        <div class="card-title">⚡ כניסה מהירה לעבודה</div>
        <div class="job-btns-grid">${btns}</div>
      </div>`;
  } else if (S.jobs.length === 0) {
    clockBtns = `
      <div class="card empty-state">
        <div class="es-icon">💼</div>
        <div class="es-title">אין עבודות עדיין</div>
        <div class="es-sub">הוסף עבודה ראשונה בהגדרות</div>
        <button class="btn btn-primary mt8" onclick="showScreen('settings')">⚙️ הגדרות</button>
      </div>`;
  }

  // Recent entries (this month, not today, up to 10)
  const recent = S.entries.filter(e => e.date !== today).slice(0, 10);
  let recentHtml = '';
  if (recent.length > 0) {
    const rows = recent.map(e => `
      <div class="entry-row" onclick="openEditEntry('${e.id}')">
        <div class="dot" style="background:${e.jobColor||'#3b82f6'}"></div>
        <div class="er-details">
          <div class="er-job">${e.jobName}</div>
          <div class="er-time">${e.date} | ${e.clockIn} – ${e.clockOut}</div>
        </div>
        <div class="er-right">
          <div class="er-hours">${fmtMins(e.totalMins)}</div>
          ${(e.ot1Mins||0)+(e.ot2Mins||0)>0 ? '<span class="ot-badge">נוספות</span>' : ''}
        </div>
      </div>`).join('');
    recentHtml = `
      <div class="card">
        <div class="card-title">📋 רשומות החודש</div>
        ${rows}
      </div>`;
  }

  const manualBtn = `<button class="btn btn-outline" onclick="openAddEntry({})">✏️ הכנסה ידנית</button>`;

  setHTML('home-content', activeHtml + clockBtns + todayHtml + recentHtml + manualBtn);
  if (S.activeSession) updateTimerDisplay();
}

// ═══════════════════════════════════════════════════════════
//  RENDER: REPORT
// ═══════════════════════════════════════════════════════════
function renderReport() {
  const now = new Date();
  // Show last 6 months
  const months = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push({ m: d.getMonth(), y: d.getFullYear() });
  }
  const monthSel = months.map(({ m, y }) => {
    const active = m === S.month && y === S.year;
    const yLabel = y !== now.getFullYear() ? ` ${y}` : '';
    return `<button class="month-chip${active?' active':''}" onclick="selectMonth(${m},${y})">${HE_MONTHS[m]}${yLabel}</button>`;
  }).join('');

  // Aggregate
  let totalMins = 0, totalEarn = 0, regMins = 0, ot1Mins = 0, ot2Mins = 0;
  const byJob = {};
  S.entries.forEach(e => {
    totalMins += e.totalMins || 0;
    totalEarn += e.earnings || 0;
    regMins   += e.regMins  || 0;
    ot1Mins   += e.ot1Mins  || 0;
    ot2Mins   += e.ot2Mins  || 0;
    if (!byJob[e.jobId]) byJob[e.jobId] = { name: e.jobName, color: e.jobColor, mins: 0, earn: 0 };
    byJob[e.jobId].mins += e.totalMins || 0;
    byJob[e.jobId].earn += e.earnings  || 0;
  });

  const statsHtml = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-val">${fmtMins(totalMins)}</div>
        <div class="stat-lbl">סה"כ שעות</div>
      </div>
      <div class="stat-card accent">
        <div class="stat-val">${fmtMoney(totalEarn)}</div>
        <div class="stat-lbl">סה"כ הכנסה</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${fmtMins(regMins)}</div>
        <div class="stat-lbl">שעות רגילות</div>
      </div>
      <div class="stat-card warn">
        <div class="stat-val">${fmtMins(ot1Mins + ot2Mins)}</div>
        <div class="stat-lbl">שעות נוספות</div>
      </div>
    </div>`;

  // Per-job breakdown (only if multiple jobs)
  const jobKeys = Object.keys(byJob);
  let jobBreakHtml = '';
  if (jobKeys.length > 1) {
    const rows = jobKeys.map(k => {
      const j = byJob[k];
      return `
        <div class="job-stat-row">
          <div class="dot" style="background:${j.color||'#3b82f6'}"></div>
          <div class="jsr-name">${j.name}</div>
          <div class="jsr-right">
            <div class="jsr-hours">${fmtMins(j.mins)}</div>
            <div class="jsr-earn">${fmtMoney(j.earn)}</div>
          </div>
        </div>`;
    }).join('');
    jobBreakHtml = `<div class="card"><div class="card-title">📊 לפי עבודה</div>${rows}</div>`;
  }

  // Daily breakdown
  const byDate = {};
  S.entries.forEach(e => {
    if (!byDate[e.date]) byDate[e.date] = [];
    byDate[e.date].push(e);
  });

  let dailyHtml = '';
  if (Object.keys(byDate).length === 0) {
    dailyHtml = '<div class="empty-state"><div class="es-icon">📭</div><div class="es-sub">אין רשומות לחודש זה</div></div>';
  } else {
    dailyHtml = Object.keys(byDate).sort((a,b) => b.localeCompare(a)).map(date => {
      const dayEntries = byDate[date];
      let dayMins = 0, dayEarn = 0;
      dayEntries.forEach(e => { dayMins += e.totalMins || 0; dayEarn += e.earnings || 0; });
      const d = new Date(date + 'T12:00:00');
      const dayLabel = d.toLocaleDateString('he-IL', { weekday: 'short', day: 'numeric', month: 'short' });
      const subRows = dayEntries.map(e => `
        <div class="sub-entry" onclick="openEditEntry('${e.id}')">
          <div class="dot sm" style="background:${e.jobColor||'#3b82f6'}"></div>
          <span>${e.jobName}: ${e.clockIn}–${e.clockOut}</span>
          <span class="se-earn">${fmtMoney(e.earnings||0)}</span>
          ${(e.ot1Mins||0)+(e.ot2Mins||0)>0?'<span class="ot-badge">נוספות</span>':''}
        </div>`).join('');
      return `
        <div class="day-card">
          <div class="day-header">
            <div class="day-label">${dayLabel}</div>
            <div class="day-total">${fmtMins(dayMins)} | ${fmtMoney(dayEarn)}</div>
          </div>
          ${subRows}
        </div>`;
    }).join('');
  }

  const addEntryBtn = `<button class="btn btn-outline" onclick="openAddEntry({})">✏️ הוסף רשומה</button>`;

  setHTML('report-content',
    `<div class="month-sel">${monthSel}</div>` +
    statsHtml + jobBreakHtml +
    `<div class="card"><div class="card-title">📅 פירוט יומי</div>${dailyHtml}</div>` +
    addEntryBtn
  );
}

function updateEntryCalc() {
  const jobId   = qs('entry-job').value;
  const dateStr = qs('entry-date').value;
  const inStr   = qs('entry-in').value;
  const outStr  = qs('entry-out').value;
  if (!inStr || !outStr || !dateStr) {
    setHTML('entry-calc', '<div class="calc-box"><div class="calc-empty">הכנס שעות לחישוב אוטומטי</div></div>');
    return;
  }
  let inDate  = parseToDate(dateStr, inStr);
  let outDate = parseToDate(dateStr, outStr);
  if (outDate <= inDate) outDate.setDate(outDate.getDate() + 1); // crosses midnight
  const totalMins = Math.round((outDate - inDate) / 60000);
  if (totalMins <= 0) {
    setHTML('entry-calc', '<div class="calc-box"><div class="calc-err">שעת יציאה לפני כניסה</div></div>');
    return;
  }
  const job  = getJob(jobId);
  const rate = job.hourlyRate || 0;
  const ec   = calcEarnings(totalMins, rate);
  let html = `<div class="calc-box">
    <div class="calc-row"><span>סה"כ שעות</span><strong>${fmtMins(totalMins)}</strong></div>`;
  if (ec.ot1Mins > 0)
    html += `<div class="calc-row ot"><span>שעות נוספות 125%</span><strong>${fmtMins(ec.ot1Mins)}</strong></div>`;
  if (ec.ot2Mins > 0)
    html += `<div class="calc-row ot"><span>שעות נוספות 150%</span><strong>${fmtMins(ec.ot2Mins)}</strong></div>`;
  if (rate > 0)
    html += `<div class="calc-row earn"><span>💰 הכנסה</span><strong>${fmtMoney(ec.earnings)}</strong></div>`;
  html += '</div>';
  setHTML('entry-calc', html);
}

async function saveEntryFromModal() {
  const jobId   = qs('entry-job').value;
  const dateStr = qs('entry-date').value;
  const inStr   = qs('entry-in').value;
  const outStr  = qs('entry-out').value;
  const notes   = qs('entry-notes').value.trim();
  if (!jobId) { toast('בחר עבודה', true); return; }
  if (!dateStr || !inStr || !outStr) { toast('מלא תאריך ושעות', true); return; }
  let inDate  = parseToDate(dateStr, inStr);
  let outDate = parseToDate(dateStr, outStr);
  if (outDate <= inDate) outDate.setDate(outDate.getDate() + 1);
  const totalMins = Math.round((outDate - inDate) / 60000);
  if (totalMins <= 0) { toast('שעות לא תקינות', true); return; }
  const job = getJob(jobId);
  const ec  = calcEarnings(totalMins, job.hourlyRate || 0);
  const entry = {
    jobId, jobName: job.name, jobColor: job.color,
    date: dateStr, clockIn: inStr, clockOut: outStr,
    totalMins: ec.totalMins, regMins: ec.regMins,
    ot1Mins: ec.ot1Mins, ot2Mins: ec.ot2Mins,
    earnings: ec.earnings, hourlyRate: job.hourlyRate || 0, notes
  };
  if (S.editEntry) entry.id = S.editEntry.id;
  loading(true, 'שומר...');
  try {
    await saveEntryData(entry);
    const ed = new Date(dateStr);
    if (ed.getMonth() === S.month && ed.getFullYear() === S.year) await loadEntries();
    hideModal('entry-modal');
    renderHome();
    if (S.currentScreen === 'report') renderReport();
    toast('✅ רשומה נשמרה!');
  } catch (e) {
    toast('שגיאה: ' + e.message, true);
  } finally {
    loading(false);
  }
}

async function deleteEntryFromModal() {
  if (!S.editEntry) return;
  hideModal('entry-modal');
  await deleteEntryById(S.editEntry.id);
}

function setScanTab(tab) {

function renderScanUI() {
  const tab = S.scanTab;
  setHTML('scan-content', `
    <div class="tabs" style="margin-bottom:14px">
      <button class="tab${tab==='camera'?' active':''}" onclick="setScanTab('camera')">📷 מצלמה</button>
      <button class="tab${tab==='gallery'?' active':''}" onclick="setScanTab('gallery')">🖼 גלריה</button>
    </div>

    <div id="scan-camera-wrap" style="display:${tab==='camera'?'block':'none'}">

      </div>

        <button class="btn btn-success" id="btn-snap" onclick="capturePhoto()" style="display:none">📸 צלם תלוש</button>
      </div>
    </div>

    <div id="scan-gallery-wrap" style="display:${tab==='gallery'?'block':'none'}">
      <div class="gallery-drop" onclick="qs('gallery-file').click()">

        <div class="gd-sub">JPG · PNG · HEIC · WebP</div>

    </div>

    <div id="scan-result-area" style="margin-top:10px"></div>
  `);

async function startCamera() {
  try {
    S.camera = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 } },
      audio: false
    });
    qs('camera-video').srcObject = S.camera;
    qs('btn-start-cam').style.display = 'none';
    qs('btn-snap').style.display = 'block';
    toast('מצלמה פעילה');
  } catch (e) {
    toast('לא ניתן לגשת למצלמה:\n' + e.message, true);
  }
}

function stopCamera() {
  if (S.camera) { S.camera.getTracks().forEach(t => t.stop()); S.camera = null; }
}

async function capturePhoto() {
  const video  = qs('camera-video');
  if (!video) return;
  const canvas = document.createElement('canvas');
  canvas.width  = video.videoWidth  || 640;
  canvas.height = video.videoHeight || 480;
  canvas.getContext('2d').drawImage(video, 0, 0);
  stopCamera();
  const dataUrl = canvas.toDataURL('image/jpeg', 0.88);
  const b64 = dataUrl.split(',')[1];
  setHTML('scan-preview-area',
    `<img src="${dataUrl}" class="scan-img-preview" alt="תמונה שצולמה">`);
  await processScanImage(b64, 'image/jpeg');
}

function handleGalleryFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) { toast('קובץ לא תקין', true); return; }
  const reader = new FileReader();
  reader.onload = async ev => {
    const dataUrl = ev.target.result;
    const b64  = dataUrl.split(',')[1];
    const mime = file.type;
    setHTML('scan-preview-area',
      `<img src="${dataUrl}" class="scan-img-preview" alt="תמונה שנבחרה">`);
    await processScanImage(b64, mime);
  };
  reader.readAsDataURL(file);
}

async function processScanImage(b64, mime) {
  const apiKey = localStorage.getItem('anthropic_api_key');
  if (!apiKey) {
    setHTML('scan-result-area', `
      <div class="scan-manual">
        <div class="sm-title">🔍 נדרש מפתח Anthropic AI</div>
        <div class="sm-sub">הוסף מפתח API בהגדרות לניתוח תלושים אוטומטי</div>
        <div style="display:flex;gap:8px;margin-top:12px">
          <button class="btn btn-outline" style="flex:1" onclick="showScreen('settings')">⚙️ הגדרות</button>
          <button class="btn btn-primary" style="flex:1" onclick="openAddEntry({})">✏️ הכנסה ידנית</button>
        </div>
      </div>`);
    return;
  }
  setHTML('scan-result-area', `<div class="scan-loading"><div class="spinner"></div><span>מנתח תלוש...</span></div>`);
  try {
    const result = await analyzeWithClaude(b64, mime);
    renderScanResult(result);
  } catch (e) {
    console.error(e);
    setHTML('scan-result-area', `
      <div class="scan-err">
        <div>❌ שגיאה: ${e.message}</div>
        <button class="btn btn-outline mt8" onclick="openAddEntry({})">✏️ הכנסה ידנית</button>
      </div>`);
  }
}

async function analyzeWithClaude(b64, mime) {
  const apiKey = localStorage.getItem('anthropic_api_key');
  const prompt = `נתח את תלוש העבודה הזה. חלץ:
- תאריך העבודה
- שעת כניסה
- שעת יציאה

החזר JSON בלבד, ללא markdown ולא הסברים:
{"date":"YYYY-MM-DD","clockIn":"HH:MM","clockOut":"HH:MM","confidence":"high/medium/low","notes":""}

אם לא ניתן לחלץ נתון כלשהו, השתמש ב-null.
תאריך היום: ${fmtDateISO(new Date())}`;

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-API-Key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-opus-4-5',
      max_tokens: 300,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: mime, data: b64 } },
          { type: 'text', text: prompt }
        ]
      }]
    })
  });

  if (!resp.ok) {
    let errMsg = `שגיאת שרת ${resp.status}`;
    try {
      const errBody = await resp.json();
      errMsg = errBody.error?.message || errMsg;
    } catch (_) {}
    throw new Error(errMsg);
  }

  const data = await resp.json();
  const text = data.content[0].text.replace(/```json|```/g, '').trim();
  return JSON.parse(text);
}

function renderScanResult(result) {
  const confMap = { high: '✅ גבוהה', medium: '⚠️ בינונית', low: '❌ נמוכה' };
  const jobOpts = S.jobs.map(j =>
    `<option value="${j.id}">${j.name}</option>`).join('');

  setHTML('scan-result-area', `
    <div class="scan-success">
      <div class="ss-title">✅ תוצאות זיהוי</div>
      <div class="ss-conf">דיוק: ${confMap[result.confidence] || result.confidence || '-'}</div>
      ${result.notes ? `<div style="font-size:12px;color:var(--text3);margin-bottom:12px">הערה: ${result.notes}</div>` : ''}

      <div class="form-group">
        <label class="form-label">תאריך</label>
        <input type="date" class="form-input" id="sr-date" value="${result.date || fmtDateISO(new Date())}">
      </div>
      <div class="two-col">
        <div class="form-group">
          <label class="form-label">כניסה</label>
          <input type="time" class="form-input" id="sr-in" value="${result.clockIn || ''}">
        </div>
        <div class="form-group">
          <label class="form-label">יציאה</label>
          <input type="time" class="form-input" id="sr-out" value="${result.clockOut || ''}">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">עבודה</label>
        <select class="form-input" id="sr-job">
          <option value="">בחר עבודה...</option>
          ${jobOpts}
        </select>
      </div>
      <button class="btn btn-primary" onclick="applyScanResult()">💾 שמור רשומה</button>
    </div>`);
}

function applyScanResult() {
  const date    = qs('sr-date')?.value;
  const clockIn = qs('sr-in')?.value;
  const clockOut= qs('sr-out')?.value;
  const jobId   = qs('sr-job')?.value;
  if (!jobId) { toast('בחר עבודה', true); return; }
  openAddEntry({ date, clockIn, clockOut, jobId });
  setHTML('scan-result-area', '');
}
